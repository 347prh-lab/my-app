<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My APP</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Zen+Kaku+Gothic+New:wght@300;400&family=Lato:wght@100;300&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #b5aa9e;
    --sand-light: #c8bfb5;
    --sand-dark: #9e9189;
    --bg: #e8e2da;
    --bg2: #ddd7cf;
    --card: #b0a89c;
    --card-hover: #a89e92;
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.7);
    --text-dark: #6b6059;
    --w: 412px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    max-width: min(412px, 100%);
    margin: 0 auto;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    background: var(--card);
    border-radius: 20px;
    margin: 16px 16px 12px;
    padding: 40px 28px 36px;
    position: relative;
    overflow: hidden;
    min-height: 200px;
    display: flex;
    align-items: center;
    gap: 18px;
  }

  /* 植物装飾 左 */
  .plant-left {
    position: absolute;
    bottom: -10px;
    left: -8px;
    opacity: 0.25;
    width: 110px;
  }

  /* 植物装飾 右 */
  .plant-right {
    position: absolute;
    top: -8px;
    right: -6px;
    opacity: 0.25;
    width: 90px;
  }

  .hero-icon {
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .hero-text {
    position: relative;
    z-index: 1;
  }

  .hero-title {
    font-family: 'Lato', sans-serif;
    font-weight: 100;
    font-size: 32px;
    letter-spacing: 0.25em;
    color: var(--text);
    line-height: 1;
  }

  .hero-title span {
    font-weight: 300;
  }

  .hero-sub {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 16px 24px;
  }

  .tile {
    background: var(--card);
    border-radius: 20px;
    padding: 0;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.2s, transform 0.15s;
    border: 1.5px solid rgba(255,255,255,0.12);
    -webkit-tap-highlight-color: transparent;
  }

  .tile:active {
    transform: scale(0.96);
    background: var(--card-hover);
  }

  .tile-icon {
    opacity: 0.85;
  }

  .tile-label {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--text);
    text-transform: lowercase;
  }

  /* ── WIP OVERLAY ── */
  .wip-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    max-width: var(--w);
    margin: 0 auto;
  }
  .wip-overlay.active { display: flex; }

  .wip-card {
    background: var(--card);
    border-radius: 20px;
    padding: 40px 36px;
    text-align: center;
    border: 1.5px solid rgba(255,255,255,0.15);
    animation: popIn 0.2s ease;
    width: 280px;
  }

  @keyframes popIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .wip-title {
    font-family: 'Lato', sans-serif;
    font-weight: 100;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .wip-msg {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 300;
    font-size: 15px;
    color: var(--text);
    line-height: 1.7;
  }

  .wip-close {
    margin-top: 24px;
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 10px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    padding: 10px 28px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .wip-close:hover { background: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<div id="roulette-view" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:300; max-width:min(412px,100%); margin:0 auto; flex-direction:column; overflow-y:auto;">

  <style>
    .rl-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 20px 10px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .rl-back {
      background: none;
      border: none;
      font-size: 22px;

      line-height: 1;

    .rl-title {

    .rl-item-dot {

      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;

      background: none;
      border: none;

      padding: 2px 4px;
      line-height: 1;
    }

      margin: 4px 20px 0;

      border: 1.5px dashed var(--sand-dark);
      border-radius: 14px;

      font-family: 'Zen Kaku Gothic New', sans-serif;

    .rl-footer {

<script>
// ── HOME ──────────────────────────────────────────────
function showWip(name) {
  document.getElementById('wip-msg').textContent = name + '\n\n作成中です';
  document.getElementById('wip-overlay').classList.add('active');
}
function hideWip() {
  document.getElementById('wip-overlay').classList.remove('active');
}

// ── ROULETTE ──────────────────────────────────────────
const RL_COLORS = [
  '#9e9189','#b0a89c','#8a8079','#c8bfb5',
  '#7a7068','#a09890','#d4cdc6','#bdb5ac',
];

let rlItems = [];
let rlAngle = 0;
let rlSpinning = false;

function openRoulette() {
  const v = document.getElementById('roulette-view');
  v.style.display = 'flex';
  if (rlItems.length === 0) {
    addRlItem(); addRlItem(); addRlItem();
  }
  drawWheel();
}

function closeRoulette() {
  document.getElementById('roulette-view').style.display = 'none';
}

function addRlItem() {
  rlItems.push({ text: '' });
  renderRlItems();
  drawWheel();
}

function removeRlItem(i) {
  if (rlItems.length <= 1) return;
  rlItems.splice(i, 1);
  renderRlItems();
  drawWheel();
}

function renderRlItems() {
  const container = document.getElementById('rl-items');
  container.innerHTML = rlItems.map((item, i) => `
    <div class="rl-item">
      <div class="rl-item-dot" style="background:${RL_COLORS[i % RL_COLORS.length]}"></div>
      <input class="rl-item-input" type="text" placeholder="テキストを入力"
        value="${escRl(item.text)}"
        oninput="rlItems[${i}].text=this.value; drawWheel()"
        onkeydown="if(event.key==='Enter') addRlItem()">
      <button class="rl-item-del" onclick="removeRlItem(${i})">×</button>
    </div>
  `).join('');
}

function escRl(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function drawWheel() {
  const canvas = document.getElementById('rl-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, r = W/2 - 4;
  ctx.clearRect(0, 0, W, H);

  const filled = rlItems.filter(it => it.text.trim());
  const items = filled.length > 0 ? filled : rlItems;
  const n = items.length;
  if (n === 0) return;

  const slice = (2 * Math.PI) / n;

  for (let i = 0; i < n; i++) {
    const start = rlAngle + i * slice - Math.PI/2;
    const end = start + slice;
    // 扇形
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = RL_COLORS[i % RL_COLORS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // テキスト
    const mid = start + slice / 2;
    const tx = cx + (r * 0.62) * Math.cos(mid);
    const ty = cy + (r * 0.62) * Math.sin(mid);
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(mid + Math.PI/2);
    ctx.fillStyle = 'white';
    ctx.font = `${Math.min(14, 280 / n / 1.4)}px "Zen Kaku Gothic New", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = items[i].text.trim() || `${i+1}`;
    ctx.fillText(label.length > 8 ? label.slice(0,7)+'…' : label, 0, 0);
    ctx.restore();
  }

  // 中心円
  ctx.beginPath();
  ctx.arc(cx, cy, 10, 0, 2*Math.PI);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fill();
}

function startRoulette() {
  if (rlSpinning) return;
  const filled = rlItems.filter(it => it.text.trim());
  const items = filled.length > 0 ? filled : rlItems;
  const n = items.length;
  if (n === 0) return;

  rlSpinning = true;
  document.getElementById('rl-start-btn').disabled = true;

  // ランダムで当選インデックスを決定
  const winner = Math.floor(Math.random() * n);
  const slice = (2 * Math.PI) / n;

  // 当選セクターが上（-π/2）に来る目標角度
  // セクターiの中心角: rlAngle + i*slice - π/2 + slice/2
  // これが -π/2 になるよう回転
  const targetSliceCenter = -slice * winner - slice/2;
  const totalRotation = (Math.PI * 2 * 4) + (targetSliceCenter - rlAngle + Math.PI * 4) % (Math.PI * 2);

  const duration = 3000;
  const startAngle = rlAngle;
  const startTime = performance.now();

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    // ease out cubic
    const ease = 1 - Math.pow(1 - t, 3);
    rlAngle = startAngle + totalRotation * ease;
    drawWheel();

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      rlAngle = startAngle + totalRotation;
      drawWheel();
      rlSpinning = false;
      document.getElementById('rl-start-btn').disabled = false;
      setTimeout(() => showResult(items[winner].text.trim() || `${winner+1}`), 300);
    }
  }
  requestAnimationFrame(animate);
}

function showResult(text) {
  document.getElementById('rl-result-text').textContent = text;
  document.getElementById('rl-result-overlay').classList.add('active');
}
function closeResult() {
  document.getElementById('rl-result-overlay').classList.remove('active');
}
</script>
