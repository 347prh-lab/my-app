<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=412px, initial-scale=1.0">
<title>My APP</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Zen+Kaku+Gothic+New:wght@300;400&family=Lato:wght@100;300&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #b5aa9e;
    --sand-light: #c8bfb5;
    --sand-dark: #9e9189;
    --bg: #e8e2da;
    --bg2: #ddd7cf;
    --card: #b0a89c;
    --card-hover: #a89e92;
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.7);
    --text-dark: #6b6059;
    --w: 412px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    max-width: var(--w);
    margin: 0 auto;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    background: var(--card);
    border-radius: 20px;
    margin: 16px 16px 12px;
    padding: 40px 28px 36px;
    position: relative;
    overflow: hidden;
    min-height: 200px;
    display: flex;
    align-items: center;
    gap: 18px;
  }

  /* 植物装飾 左 */
  .plant-left {
    position: absolute;
    bottom: -10px;
    left: -8px;
    opacity: 0.25;
    width: 110px;
  }

  /* 植物装飾 右 */
  .plant-right {
    position: absolute;
    top: -8px;
    right: -6px;
    opacity: 0.25;
    width: 90px;
  }

  .hero-icon {
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .hero-text {
    position: relative;
    z-index: 1;
  }

  .hero-title {
    font-family: 'Lato', sans-serif;
    font-weight: 100;
    font-size: 32px;
    letter-spacing: 0.25em;
    color: var(--text);
    line-height: 1;
  }

  .hero-title span {
    font-weight: 300;
  }

  .hero-sub {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 16px 24px;
  }

  .tile {
    background: var(--card);
    border-radius: 20px;
    padding: 0;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.2s, transform 0.15s;
    border: 1.5px solid rgba(255,255,255,0.12);
    -webkit-tap-highlight-color: transparent;
  }

  .tile:active {
    transform: scale(0.96);
    background: var(--card-hover);
  }

  .tile-icon {
    opacity: 0.85;
  }

  .tile-label {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--text);
    text-transform: lowercase;
  }

  /* ── WIP OVERLAY ── */
  .wip-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    max-width: var(--w);
    margin: 0 auto;
  }
  .wip-overlay.active { display: flex; }

  .wip-card {
    background: var(--card);
    border-radius: 20px;
    padding: 40px 36px;
    text-align: center;
    border: 1.5px solid rgba(255,255,255,0.15);
    animation: popIn 0.2s ease;
    width: 280px;
  }

  @keyframes popIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .wip-icon { font-size: 36px; margin-bottom: 16px; opacity: 0.8; }

  .wip-title {
    font-family: 'Lato', sans-serif;
    font-weight: 100;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .wip-msg {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 300;
    font-size: 15px;
    color: var(--text);
    line-height: 1.7;
  }

  .wip-close {
    margin-top: 24px;
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 10px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    padding: 10px 28px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .wip-close:hover { background: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <!-- 植物 左下 -->
  <svg class="plant-left" viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M60 155 C60 100 20 80 10 30" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M40 110 C30 90 10 85 5 65" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M55 130 C45 115 25 112 18 95" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M10 30 C15 10 35 5 40 20 C30 18 18 25 10 30Z" stroke="white" stroke-width="1.2" fill="none"/>
    <path d="M5 65 C8 45 28 42 30 57 C22 54 11 58 5 65Z" stroke="white" stroke-width="1.2" fill="none"/>
    <path d="M18 95 C22 76 40 75 40 90 C33 87 23 89 18 95Z" stroke="white" stroke-width="1.2" fill="none"/>
    <!-- 小枝 -->
    <path d="M50 140 C38 128 22 130 18 118" stroke="white" stroke-width="1" stroke-linecap="round"/>
    <path d="M18 118 C20 100 38 100 37 115 C30 111 21 114 18 118Z" stroke="white" stroke-width="1" fill="none"/>
    <path d="M25 75 C18 60 5 58 2 46" stroke="white" stroke-width="1" stroke-linecap="round"/>
    <path d="M2 46 C5 30 22 30 20 44 C14 40 6 42 2 46Z" stroke="white" stroke-width="1" fill="none"/>
  </svg>

  <!-- 植物 右上 -->
  <svg class="plant-right" viewBox="0 0 100 140" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 5 C50 55 80 70 88 115" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M68 50 C78 68 95 72 98 90" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M55 28 C68 42 85 44 90 60" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M88 115 C85 132 65 135 62 120 C70 122 82 118 88 115Z" stroke="white" stroke-width="1.2" fill="none"/>
    <path d="M98 90 C95 108 76 108 77 94 C84 97 95 94 98 90Z" stroke="white" stroke-width="1.2" fill="none"/>
    <path d="M90 60 C87 42 68 40 68 55 C75 52 87 55 90 60Z" stroke="white" stroke-width="1.2" fill="none"/>
    <path d="M62 80 C72 65 88 65 90 78" stroke="white" stroke-width="1" stroke-linecap="round"/>
  </svg>

  <!-- カレンダーアイコン -->
  <div class="hero-icon">
    <svg width="54" height="54" viewBox="0 0 54 54" fill="none">
      <rect x="4" y="9" width="46" height="40" rx="5" stroke="white" stroke-width="2"/>
      <line x1="4" y1="20" x2="50" y2="20" stroke="white" stroke-width="2"/>
      <line x1="17" y1="4" x2="17" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="37" y1="4" x2="37" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="hero-text">
    <div class="hero-title">My <span>APP</span></div>
    <div class="hero-sub">マイアプリ</div>
  </div>
</div>

<!-- GRID -->
<div class="grid">

  <!-- checkbox -->
  <div class="tile" onclick="showWip('checkbox')">
    <div class="tile-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <polyline points="14,34 26,46 50,20" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="tile-label">checkbox</div>
  </div>

  <!-- memo -->
  <div class="tile" onclick="showWip('memo')">
    <div class="tile-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <!-- 後ろの本 -->
        <rect x="20" y="14" width="30" height="36" rx="2" stroke="white" stroke-width="1.8" fill="none" opacity="0.5"/>
        <rect x="14" y="18" width="30" height="36" rx="2" stroke="white" stroke-width="1.8" fill="none" opacity="0.7"/>
        <!-- 前の本 -->
        <rect x="8" y="12" width="30" height="38" rx="2" stroke="white" stroke-width="2" fill="none"/>
        <line x1="14" y1="22" x2="32" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="14" y1="28" x2="32" y2="28" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="14" y1="34" x2="26" y2="34" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="tile-label">memo</div>
  </div>

  <!-- roulette -->
  <div class="tile" onclick="showWip('roulette')">
    <div class="tile-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="20" stroke="white" stroke-width="2"/>
        <!-- パイ分割線 -->
        <line x1="32" y1="12" x2="32" y2="32" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="32" y1="32" x2="49" y2="42" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="32" y1="32" x2="15" y2="42" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <!-- 中心点 -->
        <circle cx="32" cy="32" r="2.5" fill="white"/>
      </svg>
    </div>
    <div class="tile-label">roulette</div>
  </div>

  <!-- closet -->
  <div class="tile" onclick="showWip('closet')">
    <div class="tile-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <!-- Tシャツ -->
        <path d="M20 16 L10 26 L18 28 L18 50 L46 50 L46 28 L54 26 L44 16 C44 16 40 22 32 22 C24 22 20 16 20 16Z"
          stroke="white" stroke-width="2" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div class="tile-label">closet</div>
  </div>

</div>

<!-- WIP OVERLAY -->
<div class="wip-overlay" id="wip-overlay" onclick="hideWip()">
  <div class="wip-card" onclick="event.stopPropagation()">
    <div class="wip-icon" id="wip-icon">🛠️</div>
    <div class="wip-title">coming soon</div>
    <div class="wip-msg" id="wip-msg">作成中です</div>
    <button class="wip-close" onclick="hideWip()">閉じる</button>
  </div>
</div>

<script>
const WIP_INFO = {
  checkbox: { icon: '☑️', msg: 'checkbox\n\n作成中です' },
  memo:     { icon: '📖', msg: 'memo\n\n作成中です' },
  roulette: { icon: '🎡', msg: 'roulette\n\n作成中です' },
  closet:   { icon: '👗', msg: 'closet\n\n作成中です' },
};

function showWip(name) {
  const info = WIP_INFO[name] || { icon: '🛠️', msg: '作成中です' };
  document.getElementById('wip-icon').textContent = info.icon;
  document.getElementById('wip-msg').textContent = info.msg;
  document.getElementById('wip-overlay').classList.add('active');
}

function hideWip() {
  document.getElementById('wip-overlay').classList.remove('active');
}
</script>
</body>
</html>
