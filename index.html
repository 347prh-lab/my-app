<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My APP</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Zen+Kaku+Gothic+New:wght@300;400&family=Lato:wght@100;300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --sand: #b5aa9e;
    --sand-light: #c8bfb5;
    --sand-dark: #9e9189;
    --bg: #e8e2da;
    --bg2: #ddd7cf;
    --card: #b0a89c;
    --card-hover: #a89e92;
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.7);
    --text-dark: #6b6059;
    --w: 412px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    max-width: min(412px, 100%);
    margin: 0 auto;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    background: var(--card);
    border-radius: 20px;
    margin: 16px 16px 12px;
    padding: 40px 28px 36px;
    position: relative;
    overflow: hidden;
    min-height: 200px;
    display: flex;
    align-items: center;
    gap: 18px;
  }

  /* 植物装飾 左 */
  .plant-left {
    position: absolute;
    bottom: -10px;
    left: -8px;
    opacity: 0.25;
    width: 110px;
  }

  /* 植物装飾 右 */
  .plant-right {
    position: absolute;
    top: -8px;
    right: -6px;
    opacity: 0.25;
    width: 90px;
  }

  .hero-icon {
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .hero-text {
    position: relative;
    z-index: 1;
  }

  .hero-title {
    font-family: 'Lato', sans-serif;
    font-weight: 100;
    font-size: 32px;
    letter-spacing: 0.25em;
    color: var(--text);
    line-height: 1;
  }

  .hero-title span {
    font-weight: 300;
  }

  .hero-sub {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 16px 24px;
  }

  .tile {
    background: var(--card);
    border-radius: 20px;
    padding: 0;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.2s, transform 0.15s;
    border: 1.5px solid rgba(255,255,255,0.12);
    -webkit-tap-highlight-color: transparent;
  }

  .tile:active {
    transform: scale(0.96);
    background: var(--card-hover);
  }

  .tile-icon {
    opacity: 0.85;
  }

  .tile-label {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--text);
    text-transform: lowercase;
  }

  /* ── WIP OVERLAY ── */
  .wip-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    max-width: var(--w);
    margin: 0 auto;
  }
  .wip-overlay.active { display: flex; }

  .wip-card {
    background: var(--card);
    border-radius: 20px;
    padding: 40px 36px;
    text-align: center;
    border: 1.5px solid rgba(255,255,255,0.15);
    animation: popIn 0.2s ease;
    width: 280px;
  }

  @keyframes popIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .wip-title {
    font-family: 'Lato', sans-serif;
    font-weight: 100;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .wip-msg {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 300;
    font-size: 15px;
    color: var(--text);
    line-height: 1.7;
  }

  .wip-close {
    margin-top: 24px;
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 10px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    padding: 10px 28px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .wip-close:hover { background: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <!-- 植物 左下 -->
  <svg class="plant-left" viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M60 155 C60 100 20 80 10 30" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M40 110 C30 90 10 85 5 65" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M55 130 C45 115 25 112 18 95" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M10 30 C15 10 35 5 40 20 C30 18 18 25 10 30Z" stroke="white" stroke-width="1.2" fill="none"/>
    <path d="M5 65 C8 45 28 42 30 57 C22 54 11 58 5 65Z" stroke="white" stroke-width="1.2" fill="none"/>
    <path d="M18 95 C22 76 40 75 40 90 C33 87 23 89 18 95Z" stroke="white" stroke-width="1.2" fill="none"/>
    <!-- 小枝 -->
    <path d="M50 140 C38 128 22 130 18 118" stroke="white" stroke-width="1" stroke-linecap="round"/>
    <path d="M18 118 C20 100 38 100 37 115 C30 111 21 114 18 118Z" stroke="white" stroke-width="1" fill="none"/>
    <path d="M25 75 C18 60 5 58 2 46" stroke="white" stroke-width="1" stroke-linecap="round"/>
    <path d="M2 46 C5 30 22 30 20 44 C14 40 6 42 2 46Z" stroke="white" stroke-width="1" fill="none"/>
  </svg>

  <!-- 植物 右上 -->
  <svg class="plant-right" viewBox="0 0 100 140" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 5 C50 55 80 70 88 115" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M68 50 C78 68 95 72 98 90" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M55 28 C68 42 85 44 90 60" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M88 115 C85 132 65 135 62 120 C70 122 82 118 88 115Z" stroke="white" stroke-width="1.2" fill="none"/>
    <path d="M98 90 C95 108 76 108 77 94 C84 97 95 94 98 90Z" stroke="white" stroke-width="1.2" fill="none"/>
    <path d="M90 60 C87 42 68 40 68 55 C75 52 87 55 90 60Z" stroke="white" stroke-width="1.2" fill="none"/>
    <path d="M62 80 C72 65 88 65 90 78" stroke="white" stroke-width="1" stroke-linecap="round"/>
  </svg>

  <!-- カレンダーアイコン -->
  <div class="hero-icon">
    <svg width="54" height="54" viewBox="0 0 54 54" fill="none">
      <rect x="4" y="9" width="46" height="40" rx="5" stroke="white" stroke-width="2"/>
      <line x1="4" y1="20" x2="50" y2="20" stroke="white" stroke-width="2"/>
      <line x1="17" y1="4" x2="17" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="37" y1="4" x2="37" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="hero-text">
    <div class="hero-title">My <span>APP</span></div>
    <div class="hero-sub">マイアプリ</div>
  </div>
</div>

<!-- GRID -->
<div class="grid">

  <!-- CardVault -->
  <div class="tile" onclick="window.open('https://347prh-lab.github.io/cardvault/','_blank')">
    <div class="tile-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <!-- カード本体 -->
        <rect x="8" y="16" width="48" height="32" rx="4" stroke="white" stroke-width="2" fill="none"/>
        <!-- 上部帯 -->
        <rect x="8" y="22" width="48" height="8" stroke="none" fill="white" opacity="0.25"/>
        <!-- 磁気ストライプ風ライン -->
        <line x1="14" y1="36" x2="28" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <!-- チップ -->
        <rect x="34" y="32" width="10" height="8" rx="2" stroke="white" stroke-width="1.6" fill="none"/>
        <line x1="39" y1="32" x2="39" y2="40" stroke="white" stroke-width="1" opacity="0.6"/>
        <line x1="34" y1="36" x2="44" y2="36" stroke="white" stroke-width="1" opacity="0.6"/>
      </svg>
    </div>
    <div class="tile-label" style="letter-spacing:0.15em">CardVault</div>
  </div>

  <!-- stock -->
  <div class="tile" onclick="window.open('https://347prh-lab.github.io/Stock/','_blank')">
    <div class="tile-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <!-- バスケット上部弧 -->
        <path d="M16 28 Q32 14 48 28" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- バスケット本体 -->
        <path d="M12 28 L16 50 Q32 54 48 50 L52 28 Z" stroke="white" stroke-width="2" fill="none" stroke-linejoin="round"/>
        <!-- 縦線 -->
        <line x1="22" y1="28" x2="20" y2="50" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="32" y1="28" x2="32" y2="51" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="42" y1="28" x2="44" y2="50" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        <!-- 横線 -->
        <line x1="13" y1="35" x2="51" y2="35" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="14" y1="42" x2="50" y2="42" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="tile-label">stock</div>
  </div>

  <!-- L2: closet -->
  <div class="tile" onclick="openClosetDirect()">
    <div class="tile-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <!-- クローゼット本体 -->
        <rect x="8" y="18" width="48" height="36" rx="3" stroke="white" stroke-width="2" fill="none"/>
        <!-- 中央の仕切り -->
        <line x1="32" y1="18" x2="32" y2="54" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <!-- 上のハンガーバー -->
        <line x1="12" y1="26" x2="28" y2="26" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="36" y1="26" x2="52" y2="26" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <!-- ハンガー左 -->
        <path d="M20 26 C20 22 17 20 20 18 C23 16 25 18 25 20 L20 26" stroke="white" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        <!-- ハンガー右 -->
        <path d="M44 26 C44 22 41 20 44 18 C47 16 49 18 49 20 L44 26" stroke="white" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        <!-- 扉のノブ左 -->
        <circle cx="29" cy="38" r="2" stroke="white" stroke-width="1.5" fill="none"/>
        <!-- 扉のノブ右 -->
        <circle cx="35" cy="38" r="2" stroke="white" stroke-width="1.5" fill="none"/>
      </svg>
    </div>
    <div class="tile-label">closet</div>
  </div>

  <!-- R2: grid -->
  <div class="tile" onclick="openCloset()">
    <div class="tile-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <rect x="10" y="10" width="44" height="44" rx="4" stroke="white" stroke-width="2"/>
        <line x1="25" y1="10" x2="25" y2="54" stroke="white" stroke-width="1.5"/>
        <line x1="39" y1="10" x2="39" y2="54" stroke="white" stroke-width="1.5"/>
        <line x1="10" y1="24" x2="54" y2="24" stroke="white" stroke-width="1.5"/>
        <line x1="10" y1="38" x2="54" y2="38" stroke="white" stroke-width="1.5"/>
        <rect x="10" y="10" width="15" height="14" fill="white" opacity="0.25"/>
        <rect x="10" y="10" width="44" height="14" fill="white" opacity="0.15"/>
      </svg>
    </div>
    <div class="tile-label">grid</div>
  </div>

  <!-- L3: roulette -->
  <div class="tile" onclick="openRoulette()">
    <div class="tile-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="20" stroke="white" stroke-width="2"/>
        <line x1="32" y1="12" x2="32" y2="32" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="32" y1="32" x2="49" y2="42" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="32" y1="32" x2="15" y2="42" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="32" cy="32" r="2.5" fill="white"/>
      </svg>
    </div>
    <div class="tile-label">roulette</div>
  </div>

  <!-- R3: photo note -->
  <div class="tile" onclick="showWip('photo note')">
    <div class="tile-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <line x1="42" y1="14" x2="22" y2="46" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M22 46 C20 50 16 52 15 50 C14 48 17 45 22 46Z" stroke="white" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
        <line x1="36" y1="24" x2="29" y2="37" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>
        <path d="M42 14 C44 11 47 12 46 15 L43 20" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <div class="tile-label">photo note</div>
  </div>

</div>

<!-- WIP OVERLAY -->
<div class="wip-overlay" id="wip-overlay" onclick="hideWip()">
  <div class="wip-card" onclick="event.stopPropagation()">
    <div class="wip-title">coming soon</div>
    <div class="wip-msg" id="wip-msg">作成中です</div>
    <button class="wip-close" onclick="hideWip()">閉じる</button>
  </div>
</div>

<!-- ===== ROULETTE SCREENS ===== -->
<style>
  .rl-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 300;
    max-width: min(412px,100%);
    margin: 0 auto;
    flex-direction: column;
    overflow: hidden;
  }
  .rl-screen.active { display: flex; }
  .rl-screen.scroll-mode {
    overflow-y: auto;
    overflow-x: hidden;
  }

  .rl-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 20px 14px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    flex-shrink: 0;
  }
  .rl-back {
    background: none; border: none;
    font-size: 22px; color: var(--text-dark);
    cursor: pointer; padding: 4px; line-height: 1;
  }
  .rl-title {
    font-family: 'Lato', sans-serif;
    font-weight: 300; font-size: 18px;
    letter-spacing: 0.2em; color: var(--text-dark);
    flex: 1;
  }
  .rl-header-btn {
    background: var(--card); border: none;
    border-radius: 10px; color: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px; padding: 8px 14px;
    cursor: pointer; transition: background 0.2s;
  }
  .rl-header-btn:hover { background: var(--card-hover); }

  /* LIST HOME */
  .rl-list-body { padding: 16px 20px; flex: 1; overflow-y: auto; min-height: 0; }
  .rl-saved-item {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 10px;
    cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.15);
    transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .rl-saved-item:active { transform: scale(0.98); background: var(--card-hover); }
  .rl-saved-name {
    font-size: 15px; color: white;
    font-weight: 400; margin-bottom: 4px;
  }
  .rl-saved-meta {
    font-family: 'Lato', sans-serif;
    font-size: 11px; color: rgba(255,255,255,0.55);
    letter-spacing: 0.05em;
  }
  .rl-empty {
    text-align: center; padding: 40px 20px;
    color: var(--text-dark); font-size: 14px;
    opacity: 0.6; line-height: 1.8;
  }
  .rl-new-btn {
    margin: 0 20px 28px;
    width: calc(100% - 40px);
    padding: 14px;
    background: var(--card);
    border: none; border-radius: 16px;
    color: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px; letter-spacing: 0.1em;
    cursor: pointer; transition: background 0.2s;
    flex-shrink: 0;
  }
  .rl-new-btn:hover { background: var(--card-hover); }

  /* ACTION SHEET */
  .rl-sheet-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 500;
    align-items: flex-end;
    max-width: min(412px,100%); margin: 0 auto;
  }
  .rl-sheet-overlay.active { display: flex; }
  .rl-sheet {
    background: var(--bg2); width: 100%;
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 36px;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); } to { transform: translateY(0); }
  }
  .rl-sheet-title {
    font-size: 13px; color: var(--text-dark);
    letter-spacing: 0.1em; margin-bottom: 14px;
    opacity: 0.7;
  }
  .rl-sheet-btn {
    width: 100%; padding: 14px;
    background: var(--card); border: none;
    border-radius: 12px; color: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px; cursor: pointer;
    margin-bottom: 8px; text-align: left;
    padding-left: 18px;
    transition: background 0.2s;
  }
  .rl-sheet-btn:hover { background: var(--card-hover); }
  .rl-sheet-btn.danger { color: #e88; }
  .rl-sheet-cancel {
    width: 100%; padding: 14px;
    background: none; border: none;
    color: var(--text-dark); font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px; cursor: pointer; margin-top: 4px;
    opacity: 0.6;
  }

  /* EDIT SCREEN */
  .rl-edit-body { padding: 16px 20px; flex: 1; overflow-y: auto; min-height: 0; }
  .rl-form-label {
    font-size: 11px; color: var(--text-dark);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 8px; display: block; opacity: 0.7;
  }
  .rl-form-input {
    width: 100%; background: var(--card);
    border: none; border-radius: 12px;
    padding: 12px 16px; color: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px; outline: none;
    margin-bottom: 16px;
  }
  .rl-form-input::placeholder { color: rgba(255,255,255,0.4); }

  .rl-item-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border-radius: 12px;
    padding: 10px 14px; margin-bottom: 8px;
    border: 1.5px solid rgba(255,255,255,0.12);
  }
  .rl-item-input {
    flex: 1; background: none; border: none; outline: none;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px; color: white;
  }
  .rl-item-input::placeholder { color: rgba(255,255,255,0.4); }
  .rl-item-del {
    background: none; border: none;
    color: rgba(255,255,255,0.45); font-size: 18px;
    cursor: pointer; padding: 2px 4px; line-height: 1;
  }
  .rl-add-row {
    width: 100%; padding: 11px;
    background: none;
    border: 1.5px dashed var(--sand-dark);
    border-radius: 12px; color: var(--text-dark);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px; cursor: pointer;
    transition: background 0.2s; margin-bottom: 16px;
  }
  .rl-add-row:hover { background: rgba(0,0,0,0.05); }

  .rl-edit-actions {
    display: flex; flex-direction: row;
    flex-wrap: wrap; gap: 8px;
    padding: 12px 20px 24px; flex-shrink: 0;
    border-top: 1px solid rgba(0,0,0,0.08);
    background: var(--bg);
  }
  .rl-action-btn {
    padding: 7px 14px;
    border: none; border-radius: 20px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px; cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.04em; white-space: nowrap;
  }
  .rl-action-btn:active { transform: scale(0.96); }
  .rl-action-primary {
    background: var(--text-dark);
    color: white;
  }
  .rl-action-primary:hover { background: #4a3f38; }
  .rl-action-spin {
    background: var(--sand-dark);
    color: white;
  }
  .rl-action-spin:hover { background: var(--sand); }
  .rl-action-secondary {
    background: transparent; color: var(--text-dark);
    border: 1px solid var(--sand-dark);
  }

  /* SPIN SCREEN */
  .rl-canvas-wrap {
    position: relative; display: flex;
    align-items: center; justify-content: center;
    padding: 20px 20px 10px; flex-shrink: 0;
  }
  #rl-canvas { border-radius: 50%; display: block; }
  .rl-pointer {
    position: absolute; top: 6px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 20px solid var(--sand-dark);

<script>
// ── SUPABASE ───────────────────────────────────────────
const SUPABASE_URL = 'https://ktohfvlkwpzzqfebzfyb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3Q-uhIs-0b5VqNhez1xfew_OVxQmqM_';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── WIP ────────────────────────────────────────────────
function showWip(name) {
  document.getElementById('wip-msg').textContent = name + '\n\n作成中です';
  document.getElementById('wip-overlay').classList.add('active');
}
function hideWip() {
  document.getElementById('wip-overlay').classList.remove('active');
}

// ── ROULETTE STATE ─────────────────────────────────────
const RL_COLORS = [
  '#9e9189','#b0a89c','#8a8079','#c8bfb5',
  '#7a7068','#a09890','#d4cdc6','#bdb5ac',
];
let rlSavedLists = [];
let rlEditItems = [];
let rlEditId = null; // null=新規
let rlSheetTarget = null;
let rlAngle = 0;
let rlSpinning = false;
let rlSpinItems = [];

// ── OPEN / CLOSE ───────────────────────────────────────
function openRoulette() {
  showScreen('rl-home');
  loadLists();
}
function closeRoulette() {
  hideAllScreens();
}
function backToHome() {
  showScreen('rl-home');
  loadLists();
}
function showScreen(id) {
  ['rl-home','rl-edit','rl-spin'].forEach(s => {
    document.getElementById(s).classList.toggle('active', s === id);
  });
}
function hideAllScreens() {
  ['rl-home','rl-edit','rl-spin'].forEach(s =>
    document.getElementById(s).classList.remove('active'));
}

// ── LIST HOME ──────────────────────────────────────────
async function loadLists() {
  const body = document.getElementById('rl-list-body');
  body.innerHTML = '<div class="rl-empty">読み込み中...</div>';
  const { data, error } = await db.from('roulette_lists').select('*').order('created_at');
  if (error) { body.innerHTML = '<div class="rl-empty">読み込みエラー</div>'; return; }
  rlSavedLists = data || [];
  renderListHome();
}

function renderListHome() {
  const body = document.getElementById('rl-list-body');
  if (rlSavedLists.length === 0) {
    body.innerHTML = '<div class="rl-empty">保存済みリストはありません<br>新規作成してみましょう</div>';
    return;
  }
  body.innerHTML = rlSavedLists.map(lst => `
    <div class="rl-saved-item" onclick="openSheet('${lst.id}')">
      <div class="rl-saved-name">${escRl(lst.name)}</div>
      <div class="rl-saved-meta">${(lst.items||[]).length} 項目</div>
    </div>
  `).join('');
}

// ── ACTION SHEET ───────────────────────────────────────
function openSheet(id) {
  rlSheetTarget = rlSavedLists.find(l => l.id === id);
  if (!rlSheetTarget) return;
  document.getElementById('rl-sheet-title').textContent = rlSheetTarget.name;
  document.getElementById('rl-sheet').classList.add('active');
}
function closeSheet() {
  document.getElementById('rl-sheet').classList.remove('active');
}
function sheetSpin() {
  closeSheet();
  openSpin(rlSheetTarget.items || [], rlSheetTarget.name);
}
function sheetEdit() {
  closeSheet();
  openEdit(rlSheetTarget);
}
async function sheetDelete() {
  if (!confirm(`「${rlSheetTarget.name}」を削除しますか？`)) return;
  closeSheet();
  await db.from('roulette_lists').delete().eq('id', rlSheetTarget.id);
  loadLists();
}

// ── EDIT SCREEN ────────────────────────────────────────
function openEdit(list) {
  rlEditId = list ? list.id : null;
  rlEditItems = list ? [...(list.items || [])] : ['', '', ''];
  document.getElementById('rl-edit-title').textContent = list ? '編集' : '新規作成';
  document.getElementById('rl-list-name').value = list ? list.name : '';
  renderEditItems();
  renderEditActions(list);
  showScreen('rl-edit');
}

function renderEditItems() {
  document.getElementById('rl-edit-items').innerHTML = rlEditItems.map((txt, i) => `
    <div class="rl-item-row">
      <input class="rl-item-input" type="text" placeholder="選択肢 ${i+1}"
        value="${escRl(txt)}"
        oninput="rlEditItems[${i}]=this.value"
        onkeydown="if(event.key==='Enter'){addEditItem()}">
      <button class="rl-item-del" onclick="removeEditItem(${i})">×</button>
    </div>
  `).join('');
}

function addEditItem() {
  rlEditItems.push('');
  renderEditItems();
  // focus last
  const inputs = document.querySelectorAll('.rl-item-input');
  if (inputs.length) inputs[inputs.length-1].focus();
}

function removeEditItem(i) {
  if (rlEditItems.length <= 1) return;
  rlEditItems.splice(i, 1);
  renderEditItems();
}

function renderEditActions(list) {
  const isNew = !list;
  const el = document.getElementById('rl-edit-actions');
  if (isNew) {
    el.innerHTML = `
      <button class="rl-action-btn rl-action-spin" onclick="editAction('spin-only')">保存せずに回す</button>
      <button class="rl-action-btn rl-action-spin" onclick="editAction('save-spin')">保存して回す</button>
      <button class="rl-action-btn rl-action-primary" onclick="editAction('save-only')">保存</button>
      <button class="rl-action-btn rl-action-secondary" onclick="backToHome()">キャンセル</button>
    `;
  } else {
    el.innerHTML = `
      <button class="rl-action-btn rl-action-spin" onclick="editAction('save-spin')">保存して回す</button>
      <button class="rl-action-btn rl-action-primary" onclick="editAction('save-only')">保存</button>
      <button class="rl-action-btn rl-action-secondary" onclick="backToHome()">キャンセル</button>
    `;
  }
}

function getEditItems() {
  // 最新の入力値を取得
  document.querySelectorAll('.rl-item-input').forEach((el, i) => {
    rlEditItems[i] = el.value;
  });
  return rlEditItems.filter(t => t.trim());
}

function getEditName() {
  return document.getElementById('rl-list-name').value.trim();
}

async function editAction(type) {
  const items = getEditItems();
  const name = getEditName();

  if ((type === 'save-spin' || type === 'save-only') && !name) {
    alert('リスト名を入力してください');
    return;
  }
  if (items.length === 0) {
    alert('選択肢を1つ以上入力してください');
    return;
  }

  if (type === 'save-spin' || type === 'save-only') {
    if (rlEditId) {
      await db.from('roulette_lists').update({ name, items, updated_at: new Date().toISOString() }).eq('id', rlEditId);
    } else {
      await db.from('roulette_lists').insert({ name, items });
    }
  }

  if (type === 'save-only') {
    backToHome();
    return;
  }

  // spin
  const spinName = name || '無題';
  openSpin(items, spinName);
}

// ── SPIN SCREEN ────────────────────────────────────────
function openSpin(items, title) {
  rlSpinItems = [...items];
  rlAngle = 0;
  document.getElementById('rl-spin-title').textContent = title;
  renderSpinItems();
  document.getElementById('rl-start-btn').disabled = false;
  showScreen('rl-spin');
  setTimeout(drawWheel, 50);
}

function renderSpinItems() {
  const el = document.getElementById('rl-spin-items');
  el.innerHTML = rlSpinItems.map((t, i) => `
    <div class="rl-spin-item">
      <span class="rl-spin-item-text">${escRl(t)}</span>
      <button class="rl-spin-item-del" onclick="removeSpinItem(${i})">×</button>
    </div>
  `).join('') + `
    <div class="rl-spin-item" id="rl-spin-add-row">
      <input class="rl-spin-item-text" id="rl-spin-new-input" type="text"
        placeholder="追加する選択肢を入力"
        style="background:none;border:none;outline:none;font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;color:white;width:100%"
        onkeydown="if(event.key==='Enter') confirmAddSpinItem()">
      <button class="rl-spin-item-del" style="color:rgba(255,255,255,0.7);font-size:18px" onclick="confirmAddSpinItem()">＋</button>
    </div>`;
}

function removeSpinItem(i) {
  if (rlSpinItems.length <= 1) return;
  rlSpinItems.splice(i, 1);
  renderSpinItems();
  drawWheel();
}

function confirmAddSpinItem() {
  const input = document.getElementById('rl-spin-new-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  rlSpinItems.push(text);
  renderSpinItems();
  drawWheel();
  // focus new input
  const newInput = document.getElementById('rl-spin-new-input');
  if (newInput) newInput.focus();
}

function drawWheel() {
  const canvas = document.getElementById('rl-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, r = W/2 - 4;
  ctx.clearRect(0, 0, W, H);
  const items = rlSpinItems;
  const n = items.length;
  if (n === 0) return;
  const slice = (2 * Math.PI) / n;

  // 扇形の弧長から表示可能文字数を計算（最大6文字）
  const arcLen = 2 * Math.PI * r * 0.55 / n;
  // 選択肢数に応じてフォントサイズを決定（最小8px、最大13px）
  const fontSize = Math.max(8, Math.min(13, r * 0.18 / Math.max(n * 0.18, 1)));
  const maxChars = Math.min(6, Math.max(2, Math.floor(arcLen / (fontSize * 0.7))));

  for (let i = 0; i < n; i++) {
    const start = rlAngle + i * slice - Math.PI/2;
    const end = start + slice;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = RL_COLORS[i % RL_COLORS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    const mid = start + slice / 2;
    const tx = cx + (r * 0.72) * Math.cos(mid);
    const ty = cy + (r * 0.72) * Math.sin(mid);
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(mid + Math.PI/2);
    ctx.fillStyle = 'white';
    ctx.font = `${fontSize}px "Zen Kaku Gothic New", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // maxChars以降は表示しない
    const label = items[i].trim().slice(0, maxChars);
    ctx.fillText(label, 0, 0);
    ctx.restore();
  }
  ctx.beginPath();
  ctx.arc(cx, cy, 10, 0, 2*Math.PI);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fill();
}

function startRoulette() {
  if (rlSpinning) return;
  const items = rlSpinItems;
  const n = items.length;
  if (n === 0) return;
  rlSpinning = true;
  document.getElementById('rl-start-btn').disabled = true;
  const winner = Math.floor(Math.random() * n);
  const slice = (2 * Math.PI) / n;
  const targetSliceCenter = -slice * winner - slice/2;
  const totalRotation = (Math.PI * 2 * 5) + ((targetSliceCenter - rlAngle % (Math.PI*2)) + Math.PI*4) % (Math.PI*2);
  const duration = 3000;
  const startAngle = rlAngle;
  const startTime = performance.now();
  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    rlAngle = startAngle + totalRotation * ease;
    drawWheel();
    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      rlAngle = startAngle + totalRotation;
      drawWheel();
      rlSpinning = false;
      document.getElementById('rl-start-btn').disabled = false;
      setTimeout(() => showResult(items[winner].trim()), 300);
    }
  }
  requestAnimationFrame(animate);
}

function showResult(text) {
  document.getElementById('rl-result-text').textContent = text;
  document.getElementById('rl-result-overlay').classList.add('active');
}
function closeResult() {
  document.getElementById('rl-result-overlay').classList.remove('active');
}

function escRl(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}
</script>

<script>
let clLists = [];
let clCurrentData = null; // 現在開いているリストデータ
let clCurrentId = null;
let clModalTarget = null;
let clSelectedColor = 1;
let clSaveTimer = null;
let clSelectedNote = null; // {r, c} 選択中の付箋

// ── CLOSET DIRECT ─────────────────────────────────────
const CL_CLOSET_ID = '00000000-0000-0000-0000-000000000001';

async function openClosetDirect() {
  // cl-homeを経由せず直接テーブル画面へ
  clCurrentId = CL_CLOSET_ID;
  clSelectedNote = null;
  document.getElementById('cl-table-title').textContent = 'closet';
  showClScreen('cl-table-screen');
  const { data, error } = await db.from('closet_data').select('*').eq('id', CL_CLOSET_ID).single();
  if (!error && data) {
    clCurrentPattern = data.pattern || 'grid';
    clCurrentData = {
      col_headers: data.col_headers || ['','','','',''],
      row_headers: data.row_headers || ['','','','','','',''],
      cells: data.cells || {}
    };
  } else {
    clCurrentData = { col_headers: ['','','','',''], row_headers: ['','','','','','',''], cells: {} };
  }
  clRender();
}

function openCloset() {
  showClScreen('cl-home');
  clLoadLists();
}
function closeCloset() {
  clSelectedNote = null;
  hideAllClScreens();
}
function showClScreen(id) {
  ['cl-home','cl-table-screen'].forEach(s =>
    document.getElementById(s).classList.toggle('active', s === id));
}
function hideAllClScreens() {
  ['cl-home','cl-table-screen'].forEach(s =>
    document.getElementById(s).classList.remove('active'));
}
function clBackToList() {
  clSelectedNote = null;
  showClScreen('cl-home');
  clLoadLists();
}

// ── LIST HOME ──────────────────────────────────────────
async function clLoadLists() {
  const body = document.getElementById('cl-list-body');
  body.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dark);opacity:0.5;font-size:13px">読み込み中...</div>';
  const { data, error } = await db.from('closet_data').select('id,title,sort_order,pattern').order('sort_order');
  if (error) { body.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dark);opacity:0.5;font-size:13px">読み込みエラー</div>'; return; }
  clLists = data || [];
  if (clLists.length === 0) {
    body.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dark);opacity:0.5;font-size:13px">リストがありません</div>';
    return;
  }
  body.innerHTML = clLists.map(lst => {
    const pat = lst.pattern || 'grid';
    const patLabel = pat === 'photo' ? '🃏' : '⊞';
    return `
    <div class="cl-list-item">
      <span style="font-size:14px;margin-right:8px;opacity:0.7">${patLabel}</span>
      <span class="cl-list-name" onclick="clOpenList('${lst.id}','${escCl(lst.title)}','${pat}')" style="flex:1;cursor:pointer">${escCl(lst.title)}</span>
      <button onclick="clDeleteList('${lst.id}','${escCl(lst.title)}')" style="background:none;border:none;color:rgba(255,255,255,0.45);font-size:18px;cursor:pointer;padding:4px 6px;flex-shrink:0">✕</button>
      <span class="cl-list-arrow" onclick="clOpenList('${lst.id}','${escCl(lst.title)}','${pat}')" style="cursor:pointer">›</span>
    </div>`;
  }).join('');
}

async function clDeleteList(id, title) {
  if (!confirm(`「${title}」を削除しますか？`)) return;
  await db.from('closet_data').delete().eq('id', id);
  clLoadLists();
}

let clCurrentPattern = 'grid';

function clSelectPattern(p) {
  clCurrentPattern = p;
  document.getElementById('cl-pat-grid').classList.toggle('selected', p === 'grid');
  document.getElementById('cl-pat-photo').classList.toggle('selected', p === 'photo');
}

function clNewList() {
  document.getElementById('cl-name-input').value = '';
  clSelectPattern('grid');
  document.getElementById('cl-name-modal').classList.add('active');
}
function clNameModalCancel() {
  document.getElementById('cl-name-modal').classList.remove('active');
}
async function clNameModalOk() {
  const name = document.getElementById('cl-name-input').value.trim();
  if (!name) return;
  document.getElementById('cl-name-modal').classList.remove('active');
  const sortOrder = clLists.length > 0 ? Math.max(...clLists.map(l => l.sort_order)) + 1 : 0;
  // 1行目・1列目に色3をデフォルトセット
  const initCells = {};
  for (let c = 0; c < 5; c++) initCells[`0_${c}`] = { text: '', color: 3 };
  for (let r = 1; r < 7; r++) initCells[`${r}_0`] = { text: '', color: 3 };

  const { data, error } = await db.from('closet_data').insert({
    title: name,
    pattern: clCurrentPattern,
    col_headers: ['','','','',''],
    row_headers: ['','','','','','',''],
    cells: initCells,
    sort_order: sortOrder
  }).select().single();
  if (!error && data) clOpenList(data.id, data.title, data.pattern || 'grid');
  else clLoadLists();
}

// ── TABLE ──────────────────────────────────────────────
async function clOpenList(id, title, pattern) {
  clCurrentId = id;
  clCurrentPattern = pattern || 'grid';
  clSelectedNote = null;
  document.getElementById('cl-table-title').textContent = title;
  showClScreen('cl-table-screen');
  const { data, error } = await db.from('closet_data').select('*').eq('id', id).single();
  if (!error && data) {
    clCurrentPattern = data.pattern || 'grid';
    clCurrentData = {
      col_headers: data.col_headers || ['','','','',''],
      row_headers: data.row_headers || ['','','','','','',''],
      cells: data.cells || {}
    };
  } else {
    clCurrentData = { col_headers: ['','','','',''], row_headers: ['','','','','','',''], cells: {} };
  }
  clRender();
}

function clScheduleSave() {
  clearTimeout(clSaveTimer);
  clSaveTimer = setTimeout(clSave, 800);
}
async function clSave() {
  if (!clCurrentId || !clCurrentData) return;
  await db.from('closet_data').update({
    col_headers: clCurrentData.col_headers,
    row_headers: clCurrentData.row_headers,
    cells: clCurrentData.cells,
    updated_at: new Date().toISOString()
  }).eq('id', clCurrentId);
}

function clCellKey(r, c) { return `${r}_${c}`; }

let clTouchStart = {};

function clRender() {
  const wrap = document.getElementById('cl-table-wrap');
  const rows = clCurrentData.row_headers.length;
  const cols = clCurrentData.col_headers.length;
  const isPhoto = clCurrentPattern === 'photo';

  let html = '<table class="cl-table"><tbody>';
  for (let r = 0; r < rows; r++) {
    html += '<tr>';
    for (let c = 0; c < cols; c++) {
      const key = clCellKey(r, c);
      const cell = clCurrentData.cells[key];
      const isSel = clSelectedNote && clSelectedNote.r === r && clSelectedNote.c === c;

      if (isPhoto) {
        let inner = '';
        if (cell && cell.imgUrl) {
          const selClass = isSel ? ' selected' : '';
          inner = `<div class="cl-photo-img${selClass}" data-r="${r}" data-c="${c}"><img src="${cell.imgUrl}" loading="lazy"></div>`;
        } else {
          inner = `<div class="cl-photo-empty" data-r="${r}" data-c="${c}">＋</div>`;
        }
        html += `<td class="cl-td photo-cell${isSel?' note-selected':''}" data-r="${r}" data-c="${c}"
          onclick="clCellClick(event,${r},${c})"
          ontouchstart="clTouchStart['${r}_${c}']={x:event.touches[0].clientX,y:event.touches[0].clientY}"
          ontouchend="clCellTouch(event,${r},${c})"
        >${inner}</td>`;
      } else {
        let noteHtml = '';
        if (cell) {
          const text = typeof cell === 'object' ? cell.text : cell;
          const color = typeof cell === 'object' ? (cell.color || 1) : 1;
          const colorClass = color === 2 ? ' color-2' : color === 3 ? ' color-3' : '';
          const selClass = isSel ? ' selected' : '';
          noteHtml = `<div class="cl-note${colorClass}${selClass}" data-r="${r}" data-c="${c}">${escCl(text)}</div>`;
        }
        html += `<td class="cl-td${c===0?' col-first':''}${isSel?' note-selected':''}" data-r="${r}" data-c="${c}"
          onclick="clCellClick(event,${r},${c})"
          ontouchstart="clTouchStart['${r}_${c}']={x:event.touches[0].clientX,y:event.touches[0].clientY}"
          ontouchend="clCellTouch(event,${r},${c})"
        >${noteHtml}</td>`;
      }
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  html += `<button class="cl-add-row-btn" onclick="clAddRow()">＋ 行を追加</button>`;
  wrap.innerHTML = html;
  clBindNotes();
}

// ── CELL CLICK / LONG PRESS ────────────────────────────
function clCellTouch(e, r, c) {
  if (e.target.classList.contains('cl-note')) return;
  if (e.target.classList.contains('cl-photo-img')) return;
  if (e.target.closest('.cl-photo-img')) return;
  const touch = e.changedTouches[0];
  const startTouch = clTouchStart[`${r}_${c}`];
  if (startTouch) {
    const dx = Math.abs(touch.clientX - startTouch.x);
    const dy = Math.abs(touch.clientY - startTouch.y);
    if (dx > 10 || dy > 10) return;
  }
  e.preventDefault();
  clCellAction(r, c);
}

function clCellClick(e, r, c) {
  if (e.target.classList.contains('cl-note')) return;
  if (e.target.closest('.cl-photo-img')) return;
  clCellAction(r, c);
}

function clCellAction(r, c) {
  if (clSelectedNote) {
    const src = clSelectedNote;
    clSelectedNote = null;
    if (src.r === r && src.c === c) {
      // 元の場所→編集/変更/削除
      clRender();
      clHideMoveBanner();
      if (clCurrentPattern === 'photo') {
        clOpenPhotoModal(r, c);
      } else {
        clOpenModal(r, c);
      }
      return;
    }
    // 別のセル→移動
    const srcKey = clCellKey(src.r, src.c);
    const dstKey = clCellKey(r, c);
    const srcVal = clCurrentData.cells[srcKey];
    const dstVal = clCurrentData.cells[dstKey];
    if (dstVal) clCurrentData.cells[srcKey] = dstVal;
    else delete clCurrentData.cells[srcKey];
    if (srcVal) clCurrentData.cells[dstKey] = srcVal;
    else delete clCurrentData.cells[dstKey];
    clScheduleSave();
    clRender();
    clHideMoveBanner();
  } else {
    // 空セル
    if (clCurrentPattern === 'photo') {
      clUploadPhoto(r, c);
    } else {
      clOpenModal(r, c);
    }
  }
}

function clCancelMove() {
  clSelectedNote = null;
  clRender();
  clHideMoveBanner();
}

function clShowMoveBanner() {
  let banner = document.getElementById('cl-move-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'cl-move-banner';
    banner.style.cssText = `
      position:sticky; top:0; left:0; right:0;
      background:var(--sand-dark); color:white;
      text-align:center; padding:8px 16px;
      font-size:12px; letter-spacing:0.08em;
      z-index:10; display:flex; align-items:center;
      justify-content:space-between; flex-shrink:0;
    `;
    banner.innerHTML = `<span>移動先を選択（元の場所→編集）</span>
      <button onclick="clCancelMove()" style="background:rgba(255,255,255,0.25);border:none;border-radius:8px;color:white;padding:4px 10px;font-size:11px;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif">キャンセル</button>`;
    const screen = document.getElementById('cl-table-screen');
    const scrollWrap = document.getElementById('cl-scroll-wrap');
    screen.insertBefore(banner, scrollWrap);
  }
  banner.style.display = 'flex';
}

function clHideMoveBanner() {
  const banner = document.getElementById('cl-move-banner');
  if (banner) banner.style.display = 'none';
}

// ── BIND NOTES ────────────────────────────────────────
function clBindNotes() {
  document.querySelectorAll('.cl-note').forEach(note => {
    clAutoFitNote(note);
    const r = parseInt(note.dataset.r);
    const c = parseInt(note.dataset.c);
    let startX, startY;
    note.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: true });
    note.addEventListener('touchend', e => {
      if (clLongPressTriggered) { clLongPressTriggered = false; return; }
      const dx = Math.abs(e.changedTouches[0].clientX - startX);
      const dy = Math.abs(e.changedTouches[0].clientY - startY);
      if (dx > 10 || dy > 10) return;
      e.preventDefault(); e.stopPropagation();
      if (clSelectedNote) clCellAction(r, c);
      else { clSelectedNote = { r, c }; clRender(); clShowMoveBanner(); }
    }, { passive: false });
    note.addEventListener('click', e => {
      e.stopPropagation();
      if (clSelectedNote) clCellAction(r, c);
      else { clSelectedNote = { r, c }; clRender(); clShowMoveBanner(); }
    });
  });

  document.querySelectorAll('.cl-photo-img').forEach(img => {
    const r = parseInt(img.dataset.r);
    const c = parseInt(img.dataset.c);
    let startX, startY;
    img.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: true });
    img.addEventListener('touchend', e => {
      if (clLongPressTriggered) { clLongPressTriggered = false; return; }
      const dx = Math.abs(e.changedTouches[0].clientX - startX);
      const dy = Math.abs(e.changedTouches[0].clientY - startY);
      if (dx > 10 || dy > 10) return;
      e.preventDefault(); e.stopPropagation();
      if (clSelectedNote) clCellAction(r, c);
      else { clSelectedNote = { r, c }; clRender(); clShowMoveBanner(); }
    }, { passive: false });
    img.addEventListener('click', e => {
      e.stopPropagation();
      if (clSelectedNote) clCellAction(r, c);
      else { clSelectedNote = { r, c }; clRender(); clShowMoveBanner(); }
    });
  });
}

// ── PHOTO UPLOAD ───────────────────────────────────────
function clUploadPhoto(r, c) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    const ext = file.name.split('.').pop();
    const path = `${clCurrentId}/${r}_${c}_${Date.now()}.${ext}`;
    const { error } = await db.storage.from('grid-images').upload(path, file);
    if (error) { alert('アップロード失敗'); return; }
    const { data: urlData } = db.storage.from('grid-images').getPublicUrl(path);
    const key = clCellKey(r, c);
    clCurrentData.cells[key] = { imgUrl: urlData.publicUrl, path };
    clScheduleSave();
    clRender();
  };
  input.click();
}

// ── PHOTO MODAL（変更・削除） ───────────────────────────
let clPhotoModalTarget = null;

function clOpenPhotoModal(r, c) {
  clPhotoModalTarget = { r, c };
  const overlay = document.getElementById('cl-photo-action');
  overlay.classList.add('active');
}

function clPhotoActionCancel() {
  document.getElementById('cl-photo-action').classList.remove('active');
}

async function clChangePhoto(r, c) {
  clPhotoActionCancel();
  const key = clCellKey(r, c);
  const old = clCurrentData.cells[key];
  if (old && old.path) await db.storage.from('grid-images').remove([old.path]);
  clUploadPhoto(r, c);
}

async function clDeletePhoto(r, c) {
  clPhotoActionCancel();
  const key = clCellKey(r, c);
  const old = clCurrentData.cells[key];
  if (old && old.path) await db.storage.from('grid-images').remove([old.path]);
  delete clCurrentData.cells[key];
  clScheduleSave();
  clRender();
}

// ── AUTO FIT ──────────────────────────────────────────
function clAutoFitNote(note) {
  const MAX_SIZE = 11, MIN_SIZE = 6;
  let size = MAX_SIZE;
  note.style.fontSize = size + 'px';
  while (size > MIN_SIZE) {
    if (note.scrollWidth <= note.clientWidth + 1 && note.scrollHeight <= note.clientHeight + 1) break;
    size -= 0.5;
    note.style.fontSize = size + 'px';
  }
}

// ── HEADER CELL CLICK ─────────────────────────────────
function clHeaderCellTouch(e, type, idx) {
  if (e.target.classList.contains('cl-note')) return;
  e.preventDefault();
  e.stopPropagation();
  clHeaderCellAction(type, idx);
}

function clHeaderCellClick(e, type, idx) {
  if (e.target.classList.contains('cl-note')) return;
  clHeaderCellAction(type, idx);
}

function clHeaderCellAction(type, idx) {
  const key = type === 'col' ? `h_col_${idx}` : `h_row_${idx}`;
  if (clSelectedNote) {
    const src = clSelectedNote;
    clSelectedNote = null;
    if (src.key === key) {
      // 同じ場所→編集
      clRender();
      clHideMoveBanner();
      clOpenHeaderModal(type, idx);
      return;
    }
    // 移動先が同じtype（col→col、row→row）のみ許可
    if (src.headerType && src.headerType === type) {
      const srcVal = clCurrentData.cells[src.key];
      const dstVal = clCurrentData.cells[key];
      if (dstVal) clCurrentData.cells[src.key] = dstVal;
      else delete clCurrentData.cells[src.key];
      if (srcVal) clCurrentData.cells[key] = srcVal;
      else delete clCurrentData.cells[key];
      clScheduleSave();
    }
    clRender();
    clHideMoveBanner();
  } else {
    // 空ヘッダーセルタップ→新規入力
    clOpenHeaderModal(type, idx);
  }
}

function clOpenHeaderModal(type, idx) {
  const key = type === 'col' ? `h_col_${idx}` : `h_row_${idx}`;
  clModalTarget = { type: 'header', htype: type, idx, key };
  const cell = clCurrentData.cells[key];
  const text = cell ? (typeof cell === 'object' ? cell.text : cell) : '';
  document.getElementById('cl-modal-title').textContent = type === 'col' ? '列ヘッダーを編集' : '行ヘッダーを編集';
  document.getElementById('cl-modal-input').value = text;
  document.getElementById('cl-color-picker').style.display = 'none';
  document.getElementById('cl-move-btn').style.display = 'none';
  document.getElementById('cl-modal').classList.add('active');
}

// ── CELL MODAL ────────────────────────────────────────
function clOpenModal(r, c) {
  clSelectedNote = null;
  clModalTarget = { type: 'cell', r, c };
  const key = clCellKey(r, c);
  const cell = clCurrentData.cells[key];
  const text = cell ? (typeof cell === 'object' ? cell.text : cell) : '';
  const color = cell ? (typeof cell === 'object' ? (cell.color || 1) : 1) : 1;
  document.getElementById('cl-modal-title').textContent = `付箋を編集`;
  document.getElementById('cl-modal-input').value = text;
  document.getElementById('cl-color-picker').style.display = 'flex';
  document.getElementById('cl-move-btn').style.display = 'none';
  clSelectColor(color);

  // 1行目・1列目の操作ボタン
  const opArea = document.getElementById('cl-row-col-ops');
  if (r === 0 && c === 0) {
    // 角のセル：行も列も操作可能
    opArea.style.display = 'flex';
    opArea.innerHTML = `
      <button class="cl-modal-btn" style="background:var(--card);color:white" onclick="clInsertCol(0);clModalCancel()">左に列追加</button>
      <button class="cl-modal-btn" style="background:var(--card);color:white" onclick="clInsertRow(0);clModalCancel()">上に行追加</button>`;
  } else if (r === 0) {
    opArea.style.display = 'flex';
    opArea.innerHTML = `
      <button class="cl-modal-btn" style="background:var(--card);color:white" onclick="clInsertCol(${c});clModalCancel()">左に列追加</button>
      <button class="cl-modal-btn" style="background:var(--card);color:white" onclick="clInsertCol(${c+1});clModalCancel()">右に列追加</button>
      <button class="cl-modal-btn" style="background:transparent;color:var(--text-dark);border:1px solid var(--sand-dark)" onclick="clRemoveCol(${c});clModalCancel()">この列を削除</button>`;
  } else if (c === 0) {
    opArea.style.display = 'flex';
    opArea.innerHTML = `
      <button class="cl-modal-btn" style="background:var(--card);color:white" onclick="clInsertRow(${r});clModalCancel()">上に行追加</button>
      <button class="cl-modal-btn" style="background:var(--card);color:white" onclick="clInsertRow(${r+1});clModalCancel()">下に行追加</button>
      <button class="cl-modal-btn" style="background:transparent;color:var(--text-dark);border:1px solid var(--sand-dark)" onclick="clRemoveRow(${r});clModalCancel()">この行を削除</button>`;
  } else {
    opArea.style.display = 'none';
    opArea.innerHTML = '';
  }

  document.getElementById('cl-modal').classList.add('active');
}

function clStartMove() {
  const t = clModalTarget;
  if (!t || t.type !== 'cell') return;
  clSelectedNote = { r: t.r, c: t.c };
  document.getElementById('cl-modal').classList.remove('active');
  clRender();
  clShowMoveBanner();
}

function clSelectColor(n) {
  clSelectedColor = n;
  document.getElementById('cl-swatch-1').classList.toggle('selected', n === 1);
  document.getElementById('cl-swatch-2').classList.toggle('selected', n === 2);
  document.getElementById('cl-swatch-3').classList.toggle('selected', n === 3);
}

document.getElementById('cl-modal-input').addEventListener('input', function() {
  const lines = this.value.split('\n');
  if (lines.length > 2) this.value = lines.slice(0,2).join('\n');
});

function clModalOk() {
  const val = document.getElementById('cl-modal-input').value.trim();
  const t = clModalTarget;
  if (!t) return;
  const key = clCellKey(t.r, t.c);
  const existing = clCurrentData.cells[key];
  const color = existing ? (typeof existing === 'object' ? existing.color || 1 : 1) : clSelectedColor;
  if (val) clCurrentData.cells[key] = { text: val, color: clSelectedColor };
  else delete clCurrentData.cells[key];
  document.getElementById('cl-modal').classList.remove('active');
  clRender(); clScheduleSave();
}

function clModalClear() {
  const t = clModalTarget;
  if (t && t.type === 'header') {
    const key = t.key || (t.htype === 'col' ? `h_col_${t.idx}` : `h_row_${t.idx}`);
    delete clCurrentData.cells[key];
    document.getElementById('cl-modal').classList.remove('active');
    clRender(); clScheduleSave();
  } else if (t && t.type === 'cell') {
    delete clCurrentData.cells[clCellKey(t.r, t.c)];
    document.getElementById('cl-modal').classList.remove('active');
    clRender(); clScheduleSave();
  } else {
    document.getElementById('cl-modal-input').value = '';
  }
}
function clModalCancel() {
  document.getElementById('cl-modal').classList.remove('active');
}

// ── ROW/COL INSERT ────────────────────────────────────
function clInsertMenuAction(i) {
  document.getElementById('cl-insert-menu').classList.remove('active');
  clInsertMenuItems[i].action();
}
function clInsertMenuCancel() {
  document.getElementById('cl-insert-menu').classList.remove('active');
}

function clInsertRow(atR) {
  const rows = clCurrentData.row_headers.length;
  const cols = clCurrentData.col_headers.length;
  // 以降の行のセルデータを1行ずらす
  const newCells = {};
  Object.entries(clCurrentData.cells).forEach(([key, val]) => {
    const r = parseInt(key.split('_')[0]);
    const c = parseInt(key.split('_')[1]);
    if (r >= atR) newCells[`${r+1}_${c}`] = val;
    else newCells[key] = val;
  });
  // 新しい行の1列目に色3
  newCells[`${atR}_0`] = { text: '', color: 3 };
  clCurrentData.row_headers.splice(atR, 0, '');
  clCurrentData.cells = newCells;
  clRender(); clScheduleSave();
}

function clRemoveRow(r) {
  const cols = clCurrentData.col_headers.length;
  const newCells = {};
  Object.entries(clCurrentData.cells).forEach(([key, val]) => {
    const row = parseInt(key.split('_')[0]);
    const col = parseInt(key.split('_')[1]);
    if (row < r) newCells[key] = val;
    else if (row > r) newCells[`${row-1}_${col}`] = val;
  });
  clCurrentData.row_headers.splice(r, 1);
  clCurrentData.cells = newCells;
  clRender(); clScheduleSave();
}

function clInsertCol(atC) {
  const rows = clCurrentData.row_headers.length;
  const newCells = {};
  Object.entries(clCurrentData.cells).forEach(([key, val]) => {
    const r = parseInt(key.split('_')[0]);
    const c = parseInt(key.split('_')[1]);
    if (c >= atC) newCells[`${r}_${c+1}`] = val;
    else newCells[key] = val;
  });
  // 新しい列の1行目に色3
  newCells[`0_${atC}`] = { text: '', color: 3 };
  clCurrentData.col_headers.splice(atC, 0, '');
  clCurrentData.cells = newCells;
  clRender(); clScheduleSave();
}

function clRemoveCol(c) {
  const newCells = {};
  Object.entries(clCurrentData.cells).forEach(([key, val]) => {
    const row = parseInt(key.split('_')[0]);
    const col = parseInt(key.split('_')[1]);
    if (col < c) newCells[key] = val;
    else if (col > c) newCells[`${row}_${col-1}`] = val;
  });
  clCurrentData.col_headers.splice(c, 1);
  clCurrentData.cells = newCells;
  clRender(); clScheduleSave();
}
function clAddCol() {
  const newC = clCurrentData.col_headers.length;
  clCurrentData.col_headers.push('');
  // 1行目（r=0）に色3をセット
  clCurrentData.cells[clCellKey(0, newC)] = { text: '', color: 3 };
  clRender(); clScheduleSave();
}
function clAddRow() {
  const newR = clCurrentData.row_headers.length;
  clCurrentData.row_headers.push('');
  // 1列目（c=0）に色3をセット
  clCurrentData.cells[clCellKey(newR, 0)] = { text: '', color: 3 };
  clRender(); clScheduleSave();
}
function clDelCol() {
  if (clCurrentData.col_headers.length <= 1) return;
  const c = clCurrentData.col_headers.length - 1;
  clCurrentData.col_headers.pop();
  clCurrentData.row_headers.forEach((_, r) => delete clCurrentData.cells[clCellKey(r, c)]);
  clRender(); clScheduleSave();
}
function clDelRow() {
  if (clCurrentData.row_headers.length <= 1) return;
  const r = clCurrentData.row_headers.length - 1;
  clCurrentData.row_headers.pop();
  clCurrentData.col_headers.forEach((_, c) => delete clCurrentData.cells[clCellKey(r, c)]);
  clRender(); clScheduleSave();
}

function escCl(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── BIND NOTES ────────────────────────────────────────
function clBindNotes() {
  document.querySelectorAll('.cl-note').forEach(note => {
    clAutoFitNote(note);
    const r = parseInt(note.dataset.r);
    const c = parseInt(note.dataset.c);
    let startX, startY;
    note.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: true });
    note.addEventListener('touchend', e => {
      const dx = Math.abs(e.changedTouches[0].clientX - startX);
      const dy = Math.abs(e.changedTouches[0].clientY - startY);
      if (dx > 10 || dy > 10) return;
      e.preventDefault(); e.stopPropagation();
      if (clSelectedNote) clCellAction(r, c);
      else { clSelectedNote = { r, c }; clRender(); clShowMoveBanner(); }
    }, { passive: false });
    note.addEventListener('click', e => {
      e.stopPropagation();
      if (clSelectedNote) clCellAction(r, c);
      else { clSelectedNote = { r, c }; clRender(); clShowMoveBanner(); }
    });
  });

  document.querySelectorAll('.cl-photo-img').forEach(img => {
    const r = parseInt(img.dataset.r);
    const c = parseInt(img.dataset.c);
    let startX, startY;
    img.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: true });
    img.addEventListener('touchend', e => {
      const dx = Math.abs(e.changedTouches[0].clientX - startX);
      const dy = Math.abs(e.changedTouches[0].clientY - startY);
      if (dx > 10 || dy > 10) return;
      e.preventDefault(); e.stopPropagation();
      if (clSelectedNote) clCellAction(r, c);
      else { clSelectedNote = { r, c }; clRender(); clShowMoveBanner(); }
    }, { passive: false });
    img.addEventListener('click', e => {
      e.stopPropagation();
      if (clSelectedNote) clCellAction(r, c);
      else { clSelectedNote = { r, c }; clRender(); clShowMoveBanner(); }
    });
  });
}
