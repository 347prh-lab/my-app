<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My APP</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Zen+Kaku+Gothic+New:wght@300;400&family=Lato:wght@100;300&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #b5aa9e;
    --sand-light: #c8bfb5;
    --sand-dark: #9e9189;
    --bg: #e8e2da;
    --bg2: #ddd7cf;
    --card: #b0a89c;
    --card-hover: #a89e92;
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.7);
    --text-dark: #6b6059;
    --w: 412px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    max-width: min(412px, 100%);
    margin: 0 auto;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    background: var(--card);
    border-radius: 20px;
    margin: 16px 16px 12px;
    padding: 40px 28px 36px;
    position: relative;
    overflow: hidden;
    min-height: 200px;
    display: flex;
    align-items: center;
    gap: 18px;
  }

  /* 植物装飾 左 */
  .plant-left {
    position: absolute;
    bottom: -10px;
    left: -8px;
    opacity: 0.25;
    width: 110px;
  }

  /* 植物装飾 右 */
  .plant-right {
    position: absolute;
    top: -8px;
    right: -6px;
    opacity: 0.25;
    width: 90px;
  }

  .hero-icon {
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .hero-text {
    position: relative;
    z-index: 1;
  }

  .hero-title {
    font-family: 'Lato', sans-serif;
    font-weight: 100;
    font-size: 32px;
    letter-spacing: 0.25em;
    color: var(--text);
    line-height: 1;
  }

  .hero-title span {
    font-weight: 300;
  }

  .hero-sub {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 16px 24px;
  }

  .tile {
    background: var(--card);
    border-radius: 20px;
    padding: 0;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.2s, transform 0.15s;
    border: 1.5px solid rgba(255,255,255,0.12);
    -webkit-tap-highlight-color: transparent;
  }

  .tile:active {
    transform: scale(0.96);
    background: var(--card-hover);
  }

  .tile-icon {
    opacity: 0.85;
  }

  .tile-label {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--text);
    text-transform: lowercase;
  }

  /* ── WIP OVERLAY ── */
  .wip-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    max-width: var(--w);
    margin: 0 auto;
  }
  .wip-overlay.active { display: flex; }

  .wip-card {
    background: var(--card);
    border-radius: 20px;
    padding: 40px 36px;
    text-align: center;
    border: 1.5px solid rgba(255,255,255,0.15);
    animation: popIn 0.2s ease;
    width: 280px;
  }

  @keyframes popIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .wip-title {
    font-family: 'Lato', sans-serif;
    font-weight: 100;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .wip-msg {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 300;
    font-size: 15px;
    color: var(--text);
    line-height: 1.7;
  }

  .wip-close {
    margin-top: 24px;
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 10px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    padding: 10px 28px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .wip-close:hover { background: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <!-- 植物 左下 -->
  <svg class="plant-left" viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M60 155 C60 100 20 80 10 30" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M40 110 C30 90 10 85 5 65" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M55 130 C45 115 25 112 18 95" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M10 30 C15 10 35 5 40 20 C30 18 18 25 10 30Z" stroke="white" stroke-width="1.2" fill="none"/>
    <path d="M5 65 C8 45 28 42 30 57 C22 54 11 58 5 65Z" stroke="white" stroke-width="1.2" fill="none"/>
    <path d="M18 95 C22 76 40 75 40 90 C33 87 23 89 18 95Z" stroke="white" stroke-width="1.2" fill="none"/>
    <!-- 小枝 -->
    <path d="M50 140 C38 128 22 130 18 118" stroke="white" stroke-width="1" stroke-linecap="round"/>
    <path d="M18 118 C20 100 38 100 37 115 C30 111 21 114 18 118Z" stroke="white" stroke-width="1" fill="none"/>
    <path d="M25 75 C18 60 5 58 2 46" stroke="white" stroke-width="1" stroke-linecap="round"/>
    <path d="M2 46 C5 30 22 30 20 44 C14 40 6 42 2 46Z" stroke="white" stroke-width="1" fill="none"/>
  </svg>

  <!-- 植物 右上 -->
  <svg class="plant-right" viewBox="0 0 100 140" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 5 C50 55 80 70 88 115" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M68 50 C78 68 95 72 98 90" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M55 28 C68 42 85 44 90 60" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M88 115 C85 132 65 135 62 120 C70 122 82 118 88 115Z" stroke="white" stroke-width="1.2" fill="none"/>
    <path d="M98 90 C95 108 76 108 77 94 C84 97 95 94 98 90Z" stroke="white" stroke-width="1.2" fill="none"/>
    <path d="M90 60 C87 42 68 40 68 55 C75 52 87 55 90 60Z" stroke="white" stroke-width="1.2" fill="none"/>
    <path d="M62 80 C72 65 88 65 90 78" stroke="white" stroke-width="1" stroke-linecap="round"/>
  </svg>

  <!-- カレンダーアイコン -->
  <div class="hero-icon">
    <svg width="54" height="54" viewBox="0 0 54 54" fill="none">
      <rect x="4" y="9" width="46" height="40" rx="5" stroke="white" stroke-width="2"/>
      <line x1="4" y1="20" x2="50" y2="20" stroke="white" stroke-width="2"/>
      <line x1="17" y1="4" x2="17" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="37" y1="4" x2="37" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="hero-text">
    <div class="hero-title">My <span>APP</span></div>
    <div class="hero-sub">マイアプリ</div>
  </div>
</div>

<!-- GRID -->
<div class="grid">

  <!-- CardVault -->
  <div class="tile" onclick="location.href='https://347prh-lab.github.io/cardvault/'">
    <div class="tile-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <!-- カード本体 -->
        <rect x="8" y="16" width="48" height="32" rx="4" stroke="white" stroke-width="2" fill="none"/>
        <!-- 上部帯 -->
        <rect x="8" y="22" width="48" height="8" stroke="none" fill="white" opacity="0.25"/>
        <!-- 磁気ストライプ風ライン -->
        <line x1="14" y1="36" x2="28" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <!-- チップ -->
        <rect x="34" y="32" width="10" height="8" rx="2" stroke="white" stroke-width="1.6" fill="none"/>
        <line x1="39" y1="32" x2="39" y2="40" stroke="white" stroke-width="1" opacity="0.6"/>
        <line x1="34" y1="36" x2="44" y2="36" stroke="white" stroke-width="1" opacity="0.6"/>
      </svg>
    </div>
    <div class="tile-label" style="letter-spacing:0.15em">CardVault</div>
  </div>

  <!-- stock -->
  <div class="tile" onclick="location.href='https://347prh-lab.github.io/Stock/'">
    <div class="tile-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <!-- バスケット上部弧 -->
        <path d="M16 28 Q32 14 48 28" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- バスケット本体 -->
        <path d="M12 28 L16 50 Q32 54 48 50 L52 28 Z" stroke="white" stroke-width="2" fill="none" stroke-linejoin="round"/>
        <!-- 縦線 -->
        <line x1="22" y1="28" x2="20" y2="50" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="32" y1="28" x2="32" y2="51" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="42" y1="28" x2="44" y2="50" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        <!-- 横線 -->
        <line x1="13" y1="35" x2="51" y2="35" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="14" y1="42" x2="50" y2="42" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="tile-label">stock</div>
  </div>

  <!-- roulette -->
  <div class="tile" onclick="openRoulette()">
    <div class="tile-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="20" stroke="white" stroke-width="2"/>
        <line x1="32" y1="12" x2="32" y2="32" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="32" y1="32" x2="49" y2="42" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="32" y1="32" x2="15" y2="42" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="32" cy="32" r="2.5" fill="white"/>
      </svg>
    </div>
    <div class="tile-label">roulette</div>
  </div>

  <!-- closet -->
  <div class="tile" onclick="showWip('closet')">
    <div class="tile-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <path d="M20 16 L10 26 L18 28 L18 50 L46 50 L46 28 L54 26 L44 16 C44 16 40 22 32 22 C24 22 20 16 20 16Z"
          stroke="white" stroke-width="2" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div class="tile-label">closet</div>
  </div>

  <!-- photo tile -->
  <div class="tile" onclick="showWip('photo tile')">
    <div class="tile-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <!-- 後ろ2枚 -->
        <rect x="22" y="16" width="30" height="24" rx="3" stroke="white" stroke-width="1.6" fill="none" opacity="0.45" transform="rotate(6 37 28)"/>
        <rect x="18" y="14" width="30" height="24" rx="3" stroke="white" stroke-width="1.6" fill="none" opacity="0.65" transform="rotate(-4 33 26)"/>
        <!-- 前の写真 -->
        <rect x="10" y="16" width="32" height="26" rx="3" stroke="white" stroke-width="2" fill="none"/>
        <!-- 山 -->
        <polyline points="14,36 20,27 26,33 30,28 38,36" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- 太陽 -->
        <circle cx="34" cy="24" r="3" stroke="white" stroke-width="1.5" fill="none"/>
      </svg>
    </div>
    <div class="tile-label">photo tile</div>
  </div>

  <!-- photo note -->
  <div class="tile" onclick="showWip('photo note')">
    <div class="tile-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <!-- 筆 -->
        <line x1="42" y1="14" x2="22" y2="46" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        <!-- 穂先 -->
        <path d="M22 46 C20 50 16 52 15 50 C14 48 17 45 22 46Z" stroke="white" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
        <!-- 持ち手の区切り -->
        <line x1="36" y1="24" x2="29" y2="37" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>
        <!-- 持ち手の上部丸み -->
        <path d="M42 14 C44 11 47 12 46 15 L43 20" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <div class="tile-label">photo note</div>
  </div>

</div>

<!-- WIP OVERLAY -->
<div class="wip-overlay" id="wip-overlay" onclick="hideWip()">
  <div class="wip-card" onclick="event.stopPropagation()">
    <div class="wip-title">coming soon</div>
    <div class="wip-msg" id="wip-msg">作成中です</div>
    <button class="wip-close" onclick="hideWip()">閉じる</button>
  </div>
</div>

<!-- ===== ROULETTE SCREENS ===== -->
<style>
  .rl-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 300;
    max-width: min(412px,100%);
    margin: 0 auto;
    flex-direction: column;
    overflow-y: auto;
  }
  .rl-screen.active { display: flex; }

  .rl-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 20px 14px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    flex-shrink: 0;
  }
  .rl-back {
    background: none; border: none;
    font-size: 22px; color: var(--text-dark);
    cursor: pointer; padding: 4px; line-height: 1;
  }
  .rl-title {
    font-family: 'Lato', sans-serif;
    font-weight: 300; font-size: 18px;
    letter-spacing: 0.2em; color: var(--text-dark);
    flex: 1;
  }
  .rl-header-btn {
    background: var(--card); border: none;
    border-radius: 10px; color: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px; padding: 8px 14px;
    cursor: pointer; transition: background 0.2s;
  }
  .rl-header-btn:hover { background: var(--card-hover); }

  /* LIST HOME */
  .rl-list-body { padding: 16px 20px; flex: 1; }
  .rl-saved-item {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 10px;
    cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.15);
    transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .rl-saved-item:active { transform: scale(0.98); background: var(--card-hover); }
  .rl-saved-name {
    font-size: 15px; color: white;
    font-weight: 400; margin-bottom: 4px;
  }
  .rl-saved-meta {
    font-family: 'Lato', sans-serif;
    font-size: 11px; color: rgba(255,255,255,0.55);
    letter-spacing: 0.05em;
  }
  .rl-empty {
    text-align: center; padding: 40px 20px;
    color: var(--text-dark); font-size: 14px;
    opacity: 0.6; line-height: 1.8;
  }
  .rl-new-btn {
    margin: 0 20px 28px;
    width: calc(100% - 40px);
    padding: 14px;
    background: var(--card);
    border: none; border-radius: 16px;
    color: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px; letter-spacing: 0.1em;
    cursor: pointer; transition: background 0.2s;
    flex-shrink: 0;
  }
  .rl-new-btn:hover { background: var(--card-hover); }

  /* ACTION SHEET */
  .rl-sheet-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 500;
    align-items: flex-end;
    max-width: min(412px,100%); margin: 0 auto;
  }
  .rl-sheet-overlay.active { display: flex; }
  .rl-sheet {
    background: var(--bg2); width: 100%;
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 36px;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); } to { transform: translateY(0); }
  }
  .rl-sheet-title {
    font-size: 13px; color: var(--text-dark);
    letter-spacing: 0.1em; margin-bottom: 14px;
    opacity: 0.7;
  }
  .rl-sheet-btn {
    width: 100%; padding: 14px;
    background: var(--card); border: none;
    border-radius: 12px; color: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px; cursor: pointer;
    margin-bottom: 8px; text-align: left;
    padding-left: 18px;
    transition: background 0.2s;
  }
  .rl-sheet-btn:hover { background: var(--card-hover); }
  .rl-sheet-btn.danger { color: #e88; }
  .rl-sheet-cancel {
    width: 100%; padding: 14px;
    background: none; border: none;
    color: var(--text-dark); font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px; cursor: pointer; margin-top: 4px;
    opacity: 0.6;
  }

  /* EDIT SCREEN */
  .rl-edit-body { padding: 16px 20px; flex: 1; }
  .rl-form-label {
    font-size: 11px; color: var(--text-dark);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 8px; display: block; opacity: 0.7;
  }
  .rl-form-input {
    width: 100%; background: var(--card);
    border: none; border-radius: 12px;
    padding: 12px 16px; color: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px; outline: none;
    margin-bottom: 16px;
  }
  .rl-form-input::placeholder { color: rgba(255,255,255,0.4); }

  .rl-item-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border-radius: 12px;
    padding: 10px 14px; margin-bottom: 8px;
    border: 1.5px solid rgba(255,255,255,0.12);
  }
  .rl-item-input {
    flex: 1; background: none; border: none; outline: none;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px; color: white;
  }
  .rl-item-input::placeholder { color: rgba(255,255,255,0.4); }
  .rl-item-del {
    background: none; border: none;
    color: rgba(255,255,255,0.45); font-size: 18px;
    cursor: pointer; padding: 2px 4px; line-height: 1;
  }
  .rl-add-row {
    width: 100%; padding: 11px;
    background: none;
    border: 1.5px dashed var(--sand-dark);
    border-radius: 12px; color: var(--text-dark);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px; cursor: pointer;
    transition: background 0.2s; margin-bottom: 16px;
  }
  .rl-add-row:hover { background: rgba(0,0,0,0.05); }

  .rl-edit-actions {
    display: flex; flex-direction: column; gap: 8px;
    padding: 0 20px 28px; flex-shrink: 0;
  }
  .rl-action-btn {
    width: 100%; padding: 13px;
    border: none; border-radius: 14px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px; cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.05em;
  }
  .rl-action-btn:active { transform: scale(0.98); }
  .rl-action-primary { background: var(--card); color: white; }
  .rl-action-primary:hover { background: var(--card-hover); }
  .rl-action-secondary {
    background: none; color: var(--text-dark);
    border: 1.5px solid var(--sand-dark); opacity: 0.8;
  }

  /* SPIN SCREEN */
  .rl-canvas-wrap {
    position: relative; display: flex;
    align-items: center; justify-content: center;
    padding: 20px 20px 8px; flex-shrink: 0;
  }
  #rl-canvas { border-radius: 50%; display: block; }
  .rl-pointer {
    position: absolute; top: 6px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 20px solid var(--sand-dark);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    z-index: 2;
  }
  .rl-spin-items { padding: 8px 20px; flex: 1; overflow-y: auto; }
  .rl-spin-item {
    background: var(--card); border-radius: 12px;
    padding: 10px 16px; margin-bottom: 7px;
    font-size: 14px; color: white;
    border: 1.5px solid rgba(255,255,255,0.12);
  }
  .rl-spin-footer {
    padding: 12px 20px 28px; flex-shrink: 0;
  }
  .rl-start-btn {
    width: 100%; padding: 14px;
    background: var(--card); border: none;
    border-radius: 16px; color: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 16px; letter-spacing: 0.15em;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
  }
  .rl-start-btn:active { transform: scale(0.97); }
  .rl-start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* RESULT */
  .rl-result-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 600;
    align-items: center; justify-content: center;
    max-width: min(412px,100%); margin: 0 auto;
  }
  .rl-result-overlay.active { display: flex; }
  .rl-result-card {
    background: var(--card); border-radius: 24px;
    padding: 40px 32px; text-align: center; width: 300px;
    animation: popIn 0.3s ease;
    border: 1.5px solid rgba(255,255,255,0.2);
  }
  @keyframes popIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .rl-result-label {
    font-family: 'Lato', sans-serif; font-size: 11px;
    letter-spacing: 0.3em; color: rgba(255,255,255,0.6);
    text-transform: uppercase; margin-bottom: 16px;
  }
  .rl-result-text {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 26px; color: white;
    line-height: 1.4; margin-bottom: 24px;
  }
  .rl-result-close {
    background: rgba(255,255,255,0.15); border: none;
    border-radius: 12px; color: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px; padding: 10px 32px;
    cursor: pointer; transition: background 0.2s;
  }
  .rl-result-close:hover { background: rgba(255,255,255,0.25); }
</style>

<!-- SCREEN 1: LIST HOME -->
<div class="rl-screen" id="rl-home">
  <div class="rl-header">
    <button class="rl-back" onclick="closeRoulette()">←</button>
    <div class="rl-title">roulette</div>
  </div>
  <div class="rl-list-body" id="rl-list-body">
    <div class="rl-empty">読み込み中...</div>
  </div>
  <button class="rl-new-btn" onclick="openEdit(null)">＋ 新規作成</button>
</div>

<!-- SCREEN 2: EDIT / CREATE -->
<div class="rl-screen" id="rl-edit">
  <div class="rl-header">
    <button class="rl-back" onclick="backToHome()">←</button>
    <div class="rl-title" id="rl-edit-title">新規作成</div>
  </div>
  <div class="rl-edit-body">
    <label class="rl-form-label">リスト名</label>
    <input class="rl-form-input" id="rl-list-name" placeholder="例：ランチ選び">
    <label class="rl-form-label">選択肢</label>
    <div id="rl-edit-items"></div>
    <button class="rl-add-row" onclick="addEditItem()">＋ 追加</button>
  </div>
  <div class="rl-edit-actions" id="rl-edit-actions"></div>
</div>

<!-- SCREEN 3: SPIN -->
<div class="rl-screen" id="rl-spin">
  <div class="rl-header">
    <button class="rl-back" onclick="backToHome()">←</button>
    <div class="rl-title" id="rl-spin-title"></div>
  </div>
  <div class="rl-canvas-wrap">
    <div class="rl-pointer"></div>
    <canvas id="rl-canvas" width="280" height="280"></canvas>
  </div>
  <div class="rl-spin-items" id="rl-spin-items"></div>
  <div class="rl-spin-footer">
    <button class="rl-start-btn" id="rl-start-btn" onclick="startRoulette()">スタート</button>
  </div>
</div>

<!-- ACTION SHEET -->
<div class="rl-sheet-overlay" id="rl-sheet" onclick="closeSheet()">
  <div class="rl-sheet" onclick="event.stopPropagation()">
    <div class="rl-sheet-title" id="rl-sheet-title"></div>
    <button class="rl-sheet-btn" onclick="sheetSpin()">▷ このリストで回す</button>
    <button class="rl-sheet-btn" onclick="sheetEdit()">✎ 編集する</button>
    <button class="rl-sheet-btn danger" onclick="sheetDelete()">✕ 削除する</button>
    <button class="rl-sheet-cancel" onclick="closeSheet()">キャンセル</button>
  </div>
</div>

<!-- RESULT -->
<div class="rl-result-overlay" id="rl-result-overlay" onclick="closeResult()">
  <div class="rl-result-card" onclick="event.stopPropagation()">
    <div class="rl-result-label">result</div>
    <div class="rl-result-text" id="rl-result-text"></div>
    <button class="rl-result-close" onclick="closeResult()">閉じる</button>
  </div>
</div>

<script>
// ── SUPABASE ───────────────────────────────────────────
const SUPABASE_URL = 'https://ktohfvlkwpzzqfebzfyb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3Q-uhIs-0b5VqNhez1xfew_OVxQmqM_';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── WIP ────────────────────────────────────────────────
function showWip(name) {
  document.getElementById('wip-msg').textContent = name + '\n\n作成中です';
  document.getElementById('wip-overlay').classList.add('active');
}
function hideWip() {
  document.getElementById('wip-overlay').classList.remove('active');
}

// ── ROULETTE STATE ─────────────────────────────────────
const RL_COLORS = [
  '#9e9189','#b0a89c','#8a8079','#c8bfb5',
  '#7a7068','#a09890','#d4cdc6','#bdb5ac',
];
let rlSavedLists = [];
let rlEditItems = [];
let rlEditId = null; // null=新規
let rlSheetTarget = null;
let rlAngle = 0;
let rlSpinning = false;
let rlSpinItems = [];

// ── OPEN / CLOSE ───────────────────────────────────────
function openRoulette() {
  showScreen('rl-home');
  loadLists();
}
function closeRoulette() {
  hideAllScreens();
}
function backToHome() {
  showScreen('rl-home');
  loadLists();
}
function showScreen(id) {
  ['rl-home','rl-edit','rl-spin'].forEach(s => {
    document.getElementById(s).classList.toggle('active', s === id);
  });
}
function hideAllScreens() {
  ['rl-home','rl-edit','rl-spin'].forEach(s =>
    document.getElementById(s).classList.remove('active'));
}

// ── LIST HOME ──────────────────────────────────────────
async function loadLists() {
  const body = document.getElementById('rl-list-body');
  body.innerHTML = '<div class="rl-empty">読み込み中...</div>';
  const { data, error } = await db.from('roulette_lists').select('*').order('created_at');
  if (error) { body.innerHTML = '<div class="rl-empty">読み込みエラー</div>'; return; }
  rlSavedLists = data || [];
  renderListHome();
}

function renderListHome() {
  const body = document.getElementById('rl-list-body');
  if (rlSavedLists.length === 0) {
    body.innerHTML = '<div class="rl-empty">保存済みリストはありません<br>新規作成してみましょう</div>';
    return;
  }
  body.innerHTML = rlSavedLists.map(lst => `
    <div class="rl-saved-item" onclick="openSheet('${lst.id}')">
      <div class="rl-saved-name">${escRl(lst.name)}</div>
      <div class="rl-saved-meta">${(lst.items||[]).length} 項目</div>
    </div>
  `).join('');
}

// ── ACTION SHEET ───────────────────────────────────────
function openSheet(id) {
  rlSheetTarget = rlSavedLists.find(l => l.id === id);
  if (!rlSheetTarget) return;
  document.getElementById('rl-sheet-title').textContent = rlSheetTarget.name;
  document.getElementById('rl-sheet').classList.add('active');
}
function closeSheet() {
  document.getElementById('rl-sheet').classList.remove('active');
}
function sheetSpin() {
  closeSheet();
  openSpin(rlSheetTarget.items || [], rlSheetTarget.name);
}
function sheetEdit() {
  closeSheet();
  openEdit(rlSheetTarget);
}
async function sheetDelete() {
  if (!confirm(`「${rlSheetTarget.name}」を削除しますか？`)) return;
  closeSheet();
  await db.from('roulette_lists').delete().eq('id', rlSheetTarget.id);
  loadLists();
}

// ── EDIT SCREEN ────────────────────────────────────────
function openEdit(list) {
  rlEditId = list ? list.id : null;
  rlEditItems = list ? [...(list.items || [])] : ['', '', ''];
  document.getElementById('rl-edit-title').textContent = list ? '編集' : '新規作成';
  document.getElementById('rl-list-name').value = list ? list.name : '';
  renderEditItems();
  renderEditActions(list);
  showScreen('rl-edit');
}

function renderEditItems() {
  document.getElementById('rl-edit-items').innerHTML = rlEditItems.map((txt, i) => `
    <div class="rl-item-row">
      <input class="rl-item-input" type="text" placeholder="選択肢 ${i+1}"
        value="${escRl(txt)}"
        oninput="rlEditItems[${i}]=this.value"
        onkeydown="if(event.key==='Enter'){addEditItem()}">
      <button class="rl-item-del" onclick="removeEditItem(${i})">×</button>
    </div>
  `).join('');
}

function addEditItem() {
  rlEditItems.push('');
  renderEditItems();
  // focus last
  const inputs = document.querySelectorAll('.rl-item-input');
  if (inputs.length) inputs[inputs.length-1].focus();
}

function removeEditItem(i) {
  if (rlEditItems.length <= 1) return;
  rlEditItems.splice(i, 1);
  renderEditItems();
}

function renderEditActions(list) {
  const isNew = !list;
  const el = document.getElementById('rl-edit-actions');
  if (isNew) {
    el.innerHTML = `
      <button class="rl-action-btn rl-action-primary" onclick="editAction('spin-only')">保存せずに回す</button>
      <button class="rl-action-btn rl-action-primary" onclick="editAction('save-spin')">保存して回す</button>
      <button class="rl-action-btn rl-action-primary" onclick="editAction('save-only')">保存だけする</button>
      <button class="rl-action-btn rl-action-secondary" onclick="backToHome()">キャンセル</button>
    `;
  } else {
    el.innerHTML = `
      <button class="rl-action-btn rl-action-primary" onclick="editAction('save-spin')">保存して回す</button>
      <button class="rl-action-btn rl-action-primary" onclick="editAction('save-only')">保存だけする</button>
      <button class="rl-action-btn rl-action-secondary" onclick="backToHome()">キャンセル</button>
    `;
  }
}

function getEditItems() {
  // 最新の入力値を取得
  document.querySelectorAll('.rl-item-input').forEach((el, i) => {
    rlEditItems[i] = el.value;
  });
  return rlEditItems.filter(t => t.trim());
}

function getEditName() {
  return document.getElementById('rl-list-name').value.trim();
}

async function editAction(type) {
  const items = getEditItems();
  const name = getEditName();

  if ((type === 'save-spin' || type === 'save-only') && !name) {
    alert('リスト名を入力してください');
    return;
  }
  if (items.length === 0) {
    alert('選択肢を1つ以上入力してください');
    return;
  }

  if (type === 'save-spin' || type === 'save-only') {
    if (rlEditId) {
      await db.from('roulette_lists').update({ name, items, updated_at: new Date().toISOString() }).eq('id', rlEditId);
    } else {
      await db.from('roulette_lists').insert({ name, items });
    }
  }

  if (type === 'save-only') {
    backToHome();
    return;
  }

  // spin
  const spinName = name || '無題';
  openSpin(items, spinName);
}

// ── SPIN SCREEN ────────────────────────────────────────
function openSpin(items, title) {
  rlSpinItems = items;
  rlAngle = 0;
  document.getElementById('rl-spin-title').textContent = title;
  document.getElementById('rl-spin-items').innerHTML =
    items.map(t => `<div class="rl-spin-item">${escRl(t)}</div>`).join('');
  document.getElementById('rl-start-btn').disabled = false;
  showScreen('rl-spin');
  setTimeout(drawWheel, 50);
}

function drawWheel() {
  const canvas = document.getElementById('rl-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, r = W/2 - 4;
  ctx.clearRect(0, 0, W, H);
  const items = rlSpinItems;
  const n = items.length;
  if (n === 0) return;
  const slice = (2 * Math.PI) / n;
  for (let i = 0; i < n; i++) {
    const start = rlAngle + i * slice - Math.PI/2;
    const end = start + slice;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = RL_COLORS[i % RL_COLORS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    const mid = start + slice / 2;
    const tx = cx + (r * 0.62) * Math.cos(mid);
    const ty = cy + (r * 0.62) * Math.sin(mid);
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(mid + Math.PI/2);
    ctx.fillStyle = 'white';
    ctx.font = `${Math.min(14, 260 / n / 1.2)}px "Zen Kaku Gothic New", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = items[i].trim();
    ctx.fillText(label.length > 8 ? label.slice(0,7)+'…' : label, 0, 0);
    ctx.restore();
  }
  ctx.beginPath();
  ctx.arc(cx, cy, 10, 0, 2*Math.PI);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fill();
}

function startRoulette() {
  if (rlSpinning) return;
  const items = rlSpinItems;
  const n = items.length;
  if (n === 0) return;
  rlSpinning = true;
  document.getElementById('rl-start-btn').disabled = true;
  const winner = Math.floor(Math.random() * n);
  const slice = (2 * Math.PI) / n;
  const targetSliceCenter = -slice * winner - slice/2;
  const totalRotation = (Math.PI * 2 * 5) + ((targetSliceCenter - rlAngle % (Math.PI*2)) + Math.PI*4) % (Math.PI*2);
  const duration = 3000;
  const startAngle = rlAngle;
  const startTime = performance.now();
  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    rlAngle = startAngle + totalRotation * ease;
    drawWheel();
    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      rlAngle = startAngle + totalRotation;
      drawWheel();
      rlSpinning = false;
      document.getElementById('rl-start-btn').disabled = false;
      setTimeout(() => showResult(items[winner].trim()), 300);
    }
  }
  requestAnimationFrame(animate);
}

function showResult(text) {
  document.getElementById('rl-result-text').textContent = text;
  document.getElementById('rl-result-overlay').classList.add('active');
}
function closeResult() {
  document.getElementById('rl-result-overlay').classList.remove('active');
}

function escRl(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}
</script>
</body>
</html>
