<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=412px, initial-scale=1.0">
<title>my app</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #1a1a1a;
    --bg2: #222222;
    --bg3: #2a2a2a;
    --border: #333333;
    --border2: #444444;
    --text: #e8e8e8;
    --text2: #999999;
    --text3: #666666;
    --accent: #c8c8c8;
    --accent2: #888888;
    --danger: #e06c75;
    --success: #98c379;
    --warn: #e5c07b;
    --type-text: #7eb8d4;
    --type-table: #c792ea;
    --type-check: #98c379;
    --type-image: #e5c07b;
    --w: 412px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 300;
    max-width: var(--w);
    margin: 0 auto;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-title {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--text);
  }

  .header-sub {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .btn-add {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn-add:hover { background: var(--border2); }

  /* MEMO LIST */
  .memo-list {
    padding: 12px 16px;
  }

  .memo-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 0;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    overflow: hidden;
  }
  .memo-item:hover { border-color: var(--border2); background: var(--bg3); }

  .memo-drag-handle {
    padding: 0 12px;
    color: var(--text3);
    font-size: 16px;
    cursor: grab;
    align-self: stretch;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    user-select: none;
  }
  .memo-drag-handle:active { cursor: grabbing; }

  .memo-type-bar {
    width: 3px;
    align-self: stretch;
    flex-shrink: 0;
  }

  .memo-info {
    flex: 1;
    padding: 14px 12px;
    min-width: 0;
  }

  .memo-title {
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .memo-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  .memo-arrow {
    padding: 0 14px;
    color: var(--text3);
    font-size: 14px;
    flex-shrink: 0;
  }

  /* TYPE COLORS */
  .type-text { background: var(--type-text); }
  .type-table { background: var(--type-table); }
  .type-checklist { background: var(--type-check); }
  .type-image { background: var(--type-image); }

  .type-label-text { color: var(--type-text); }
  .type-label-table { color: var(--type-table); }
  .type-label-checklist { color: var(--type-check); }
  .type-label-image { color: var(--type-image); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 13px; line-height: 1.8; }

  /* MODAL OVERLAY */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: flex-end;
    max-width: var(--w);
    margin: 0 auto;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--bg2);
    border-top: 1px solid var(--border2);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg2);
    z-index: 10;
  }

  .modal-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .modal-body { padding: 20px; }

  .btn-close {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 22px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }

  /* TYPE SELECTOR */
  .type-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .type-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 14px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg3);
  }
  .type-card:hover { border-color: var(--border2); }
  .type-card.selected { border-color: var(--accent2); background: var(--bg); }

  .type-card-icon { font-size: 22px; margin-bottom: 8px; }
  .type-card-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .type-card-desc { font-size: 11px; color: var(--text3); margin-top: 3px; line-height: 1.5; }

  /* FORM */
  .form-group { margin-bottom: 16px; }
  .form-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .form-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--border2); }
  .form-input::placeholder { color: var(--text3); }

  textarea.form-input {
    resize: vertical;
    min-height: 120px;
    line-height: 1.6;
  }

  /* TABLE SIZE INPUTS */
  .table-size-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .table-size-row input {
    width: 70px;
    text-align: center;
  }
  .table-size-sep { color: var(--text3); font-size: 18px; }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px 20px;
    border-radius: 8px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    width: 100%;
  }
  .btn-primary:hover { background: var(--text); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
    width: 100%;
  }
  .btn-danger:hover { background: var(--danger); color: white; }

  .btn-secondary {
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--border2); }

  /* DETAIL VIEW */
  .detail-view {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 300;
    max-width: var(--w);
    margin: 0 auto;
    overflow-y: auto;
    flex-direction: column;
  }
  .detail-view.active { display: flex; }

  .detail-header {
    position: sticky;
    top: 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10;
  }

  .btn-back {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
  }

  .detail-title-area { flex: 1; min-width: 0; }
  .detail-title {
    font-size: 16px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .detail-type-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  .btn-edit-toggle {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .btn-edit-toggle.editing {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .detail-body { padding: 20px; flex: 1; }

  /* TEXT MEMO */
  .text-content {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* TABLE MEMO */
  .table-wrapper { overflow-x: auto; }
  .memo-table {
    border-collapse: collapse;
    width: 100%;
    min-width: max-content;
    font-size: 13px;
  }
  .memo-table td, .memo-table th {
    border: 1px solid var(--border2);
    padding: 8px 10px;
    min-width: 80px;
    color: var(--text);
    vertical-align: top;
  }
  .memo-table td[contenteditable="true"] {
    outline: none;
    background: var(--bg3);
  }
  .memo-table td[contenteditable="true"]:focus {
    background: var(--bg);
    border-color: var(--accent2);
  }

  .table-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .table-controls .btn-secondary {
    font-size: 12px;
    padding: 6px 12px;
  }

  /* CHECKLIST MEMO */
  .checklist-items { display: flex; flex-direction: column; gap: 4px; }

  .check-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--bg3);
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .check-item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--success);
    cursor: pointer;
    flex-shrink: 0;
  }

  .check-item-text {
    flex: 1;
    font-size: 14px;
    color: var(--text);
    background: none;
    border: none;
    outline: none;
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }

  .check-item-text.done {
    text-decoration: line-through;
    color: var(--text3);
  }

  .check-item-del {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    padding: 2px;
    display: none;
  }
  .editing-mode .check-item-del { display: block; }

  .btn-add-check {
    width: 100%;
    padding: 10px;
    background: var(--bg3);
    border: 1px dashed var(--border2);
    border-radius: 6px;
    color: var(--text3);
    font-size: 13px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    display: none;
  }
  .editing-mode .btn-add-check { display: block; }
  .btn-add-check:hover { border-color: var(--accent2); color: var(--text2); }

  /* IMAGE MEMO */
  .image-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .image-item {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg3);
    aspect-ratio: 1;
  }

  .image-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .image-item-del {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,0.7);
    border: none;
    border-radius: 50%;
    color: white;
    width: 26px;
    height: 26px;
    cursor: pointer;
    font-size: 14px;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .editing-mode .image-item-del { display: flex; }

  .image-upload-area {
    border: 1px dashed var(--border2);
    border-radius: 8px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    color: var(--text3);
    font-size: 13px;
    transition: all 0.2s;
    display: none;
    margin-top: 12px;
  }
  .editing-mode .image-upload-area { display: block; }
  .image-upload-area:hover { border-color: var(--accent2); color: var(--text2); }
  .image-upload-area input { display: none; }

  /* TABLE RESIZE MODAL */
  .resize-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .resize-row label { font-size: 13px; color: var(--text2); width: 30px; }
  .resize-row input {
    width: 70px;
    text-align: center;
  }

  /* DRAG OVER */
  .memo-item.drag-over {
    border-color: var(--accent2);
    opacity: 0.6;
  }
  .memo-item.dragging { opacity: 0.3; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
    max-width: calc(var(--w) - 40px);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  /* SECTION LABEL */
  .section-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-family: 'DM Mono', monospace;
  }

  /* IMAGE FULL VIEW */
  .img-fullview {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 999;
    align-items: center;
    justify-content: center;
    max-width: var(--w);
    margin: 0 auto;
  }
  .img-fullview.active { display: flex; }
  .img-fullview img { max-width: 100%; max-height: 100vh; object-fit: contain; }
  .img-fullview-close {
    position: absolute;
    top: 20px;
    right: 20px;
    background: none;
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- HOME -->
<div id="home-view">
  <div class="header">
    <div>
      <div class="header-title">my app</div>
      <div class="header-sub">memo</div>
    </div>
    <button class="btn-add" onclick="openAddModal()">＋</button>
  </div>

  <div class="memo-list" id="memo-list">
    <div class="loading">loading...</div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">新しいメモ</span>
      <button class="btn-close" onclick="closeAddModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="section-label">メモの種類</div>
      <div class="type-grid">
        <div class="type-card" onclick="selectType('text')" id="type-text">
          <div class="type-card-icon">📝</div>
          <div class="type-card-name">テキスト</div>
          <div class="type-card-desc">自由なテキストメモ</div>
        </div>
        <div class="type-card" onclick="selectType('table')" id="type-table">
          <div class="type-card-icon">📊</div>
          <div class="type-card-name">表</div>
          <div class="type-card-desc">行列形式の表メモ</div>
        </div>
        <div class="type-card" onclick="selectType('checklist')" id="type-checklist">
          <div class="type-card-icon">✅</div>
          <div class="type-card-name">チェックリスト</div>
          <div class="type-card-desc">タスク・ToDoリスト</div>
        </div>
        <div class="type-card" onclick="selectType('image')" id="type-image">
          <div class="type-card-icon">🖼️</div>
          <div class="type-card-name">画像</div>
          <div class="type-card-desc">画像付きメモ</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">タイトル</label>
        <input type="text" class="form-input" id="new-title" placeholder="メモのタイトル">
      </div>

      <!-- TABLE SIZE -->
      <div class="form-group" id="table-size-group" style="display:none">
        <label class="form-label">表のサイズ</label>
        <div class="table-size-row">
          <input type="number" class="form-input" id="table-rows" value="3" min="1" max="20">
          <span class="table-size-sep">行 ×</span>
          <input type="number" class="form-input" id="table-cols" value="3" min="1" max="10">
          <span class="table-size-sep">列</span>
        </div>
      </div>

      <button class="btn btn-primary" onclick="createMemo()" id="btn-create" disabled>作成する</button>
    </div>
  </div>
</div>

<!-- DETAIL VIEW -->
<div class="detail-view" id="detail-view">
  <div class="detail-header">
    <button class="btn-back" onclick="closeDetail()">←</button>
    <div class="detail-title-area">
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-type-badge" id="detail-type-badge"></div>
    </div>
    <button class="btn-edit-toggle" id="btn-edit-toggle" onclick="toggleEdit()">編集</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- IMAGE FULLVIEW -->
<div class="img-fullview" id="img-fullview" onclick="closeFullview()">
  <button class="img-fullview-close">×</button>
  <img id="fullview-img" src="">
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://ktohfvlkwpzzqfebzfyb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3Q-uhIs-0b5VqNhez1xfew_OVxQmqM_';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let memos = [];
let currentMemo = null;
let isEditing = false;
let selectedType = null;
let dragSrcIndex = null;

// TYPE CONFIG
const TYPE_CONFIG = {
  text: { label: 'テキスト', color: 'var(--type-text)', badge: 'TEXT' },
  table: { label: '表', color: 'var(--type-table)', badge: 'TABLE' },
  checklist: { label: 'チェックリスト', color: 'var(--type-check)', badge: 'CHECK' },
  image: { label: '画像', color: 'var(--type-image)', badge: 'IMAGE' },
};

// ── INIT ──────────────────────────────────────────────
async function init() {
  await loadMemos();
}

async function loadMemos() {
  const list = document.getElementById('memo-list');
  list.innerHTML = '<div class="loading">loading...</div>';
  const { data, error } = await db.from('memos').select('*').order('sort_order');
  if (error) { list.innerHTML = '<div class="loading">読み込みエラー</div>'; return; }
  memos = data || [];
  renderMemoList();
}

function renderMemoList() {
  const list = document.getElementById('memo-list');
  if (memos.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>メモがありません<br>＋ボタンで追加してください</p></div>`;
    return;
  }
  list.innerHTML = memos.map((m, i) => {
    const cfg = TYPE_CONFIG[m.type] || TYPE_CONFIG.text;
    const date = new Date(m.updated_at).toLocaleDateString('ja-JP', { month:'numeric', day:'numeric' });
    return `
      <div class="memo-item" draggable="true"
        ondragstart="onDragStart(event,${i})"
        ondragover="onDragOver(event,${i})"
        ondrop="onDrop(event,${i})"
        ondragend="onDragEnd()"
        onclick="openDetail('${m.id}')">
        <div class="memo-drag-handle">⠿</div>
        <div class="memo-type-bar" style="background:${cfg.color}"></div>
        <div class="memo-info">
          <div class="memo-title">${escHtml(m.title)}</div>
          <div class="memo-meta type-label-${m.type}">${cfg.label} · ${date}</div>
        </div>
        <div class="memo-arrow">›</div>
      </div>`;
  }).join('');
}

// ── ADD MODAL ─────────────────────────────────────────
function openAddModal() {
  selectedType = null;
  document.getElementById('new-title').value = '';
  document.getElementById('table-rows').value = 3;
  document.getElementById('table-cols').value = 3;
  document.getElementById('table-size-group').style.display = 'none';
  document.getElementById('btn-create').disabled = true;
  document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('add-modal').classList.add('active');
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('active');
}

function selectType(type) {
  selectedType = type;
  document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('type-' + type).classList.add('selected');
  document.getElementById('table-size-group').style.display = type === 'table' ? 'block' : 'none';
  checkCreateReady();
}

document.getElementById('new-title').addEventListener('input', checkCreateReady);
function checkCreateReady() {
  const title = document.getElementById('new-title').value.trim();
  document.getElementById('btn-create').disabled = !(title && selectedType);
}

async function createMemo() {
  const title = document.getElementById('new-title').value.trim();
  if (!title || !selectedType) return;

  let content = {};
  if (selectedType === 'text') content = { text: '' };
  if (selectedType === 'table') {
    const rows = parseInt(document.getElementById('table-rows').value) || 3;
    const cols = parseInt(document.getElementById('table-cols').value) || 3;
    content = { rows, cols, cells: Array.from({length: rows}, () => Array(cols).fill('')) };
  }
  if (selectedType === 'checklist') content = { items: [] };
  if (selectedType === 'image') content = { images: [] };

  const sortOrder = memos.length > 0 ? Math.max(...memos.map(m => m.sort_order)) + 1 : 0;
  const { data: memo, error: e1 } = await db.from('memos').insert({ title, type: selectedType, sort_order: sortOrder }).select().single();
  if (e1) { showToast('作成に失敗しました'); return; }
  await db.from('memo_content').insert({ memo_id: memo.id, content });

  closeAddModal();
  await loadMemos();
  showToast('メモを作成しました');
  openDetail(memo.id);
}

// ── DETAIL VIEW ───────────────────────────────────────
async function openDetail(id) {
  currentMemo = memos.find(m => m.id === id);
  if (!currentMemo) return;
  isEditing = false;

  const { data: contentRow } = await db.from('memo_content').select('*').eq('memo_id', id).single();
  currentMemo._content = contentRow ? contentRow.content : {};
  currentMemo._contentId = contentRow ? contentRow.id : null;

  renderDetail();
  document.getElementById('detail-view').classList.add('active');
}

function closeDetail() {
  document.getElementById('detail-view').classList.remove('active');
  currentMemo = null;
  isEditing = false;
  loadMemos();
}

function renderDetail() {
  const cfg = TYPE_CONFIG[currentMemo.type];
  document.getElementById('detail-title').textContent = currentMemo.title;
  document.getElementById('detail-type-badge').textContent = cfg.badge;
  document.getElementById('detail-type-badge').style.color = cfg.color;
  document.getElementById('btn-edit-toggle').textContent = isEditing ? '保存' : '編集';
  document.getElementById('btn-edit-toggle').className = 'btn-edit-toggle' + (isEditing ? ' editing' : '');

  const body = document.getElementById('detail-body');
  if (currentMemo.type === 'text') renderTextDetail(body);
  else if (currentMemo.type === 'table') renderTableDetail(body);
  else if (currentMemo.type === 'checklist') renderChecklistDetail(body);
  else if (currentMemo.type === 'image') renderImageDetail(body);
}

async function toggleEdit() {
  if (isEditing) {
    await saveCurrentMemo();
    isEditing = false;
  } else {
    isEditing = true;
  }
  renderDetail();
}

async function saveCurrentMemo() {
  const type = currentMemo.type;
  let content = {};

  if (type === 'text') {
    const el = document.getElementById('text-editor');
    content = { text: el ? el.value : (currentMemo._content.text || '') };
  }
  else if (type === 'table') {
    const cells = [];
    const rows = currentMemo._content.rows;
    const cols = currentMemo._content.cols;
    for (let r = 0; r < rows; r++) {
      const row = [];
      for (let c = 0; c < cols; c++) {
        const td = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
        row.push(td ? td.innerText : '');
      }
      cells.push(row);
    }
    content = { rows, cols, cells };
  }
  else if (type === 'checklist') {
    const items = [];
    document.querySelectorAll('.check-item').forEach(item => {
      const cb = item.querySelector('input[type="checkbox"]');
      const txt = item.querySelector('.check-item-text');
      if (txt && txt.value.trim()) items.push({ text: txt.value, done: cb.checked });
    });
    content = { items };
  }
  else if (type === 'image') {
    content = { images: currentMemo._content.images || [] };
  }

  currentMemo._content = content;
  await db.from('memo_content').update({ content }).eq('id', currentMemo._contentId);
  await db.from('memos').update({ updated_at: new Date().toISOString() }).eq('id', currentMemo.id);
  showToast('保存しました');
}

// ── TEXT ─────────────────────────────────────────────
function renderTextDetail(body) {
  const text = currentMemo._content.text || '';
  if (isEditing) {
    body.innerHTML = `
      <div class="form-group">
        <label class="form-label">タイトル</label>
        <input type="text" class="form-input" id="title-editor" value="${escHtml(currentMemo.title)}">
      </div>
      <div class="form-group">
        <label class="form-label">テキスト</label>
        <textarea class="form-input" id="text-editor" style="min-height:300px">${escHtml(text)}</textarea>
      </div>
      <div class="divider"></div>
      <button class="btn btn-danger" onclick="deleteMemo()">このメモを削除</button>`;
    document.getElementById('title-editor').addEventListener('input', e => {
      currentMemo.title = e.target.value;
      document.getElementById('detail-title').textContent = e.target.value;
    });
  } else {
    body.innerHTML = `<div class="text-content">${escHtml(text) || '<span style="color:var(--text3)">内容なし</span>'}</div>`;
  }
}

// ── TABLE ─────────────────────────────────────────────
function renderTableDetail(body) {
  const { rows, cols, cells } = currentMemo._content;
  const safeCells = cells || Array.from({length: rows}, () => Array(cols).fill(''));

  let html = '';
  if (isEditing) {
    html += `
      <div class="form-group">
        <label class="form-label">タイトル</label>
        <input type="text" class="form-input" id="title-editor" value="${escHtml(currentMemo.title)}">
      </div>
      <div class="table-controls">
        <button class="btn btn-secondary" onclick="resizeTable()">サイズ変更</button>
      </div>`;
  }

  html += `<div class="table-wrapper"><table class="memo-table"><tbody>`;
  for (let r = 0; r < rows; r++) {
    html += '<tr>';
    for (let c = 0; c < cols; c++) {
      const val = (safeCells[r] && safeCells[r][c]) ? escHtml(safeCells[r][c]) : '';
      if (isEditing) {
        html += `<td contenteditable="true" data-r="${r}" data-c="${c}">${val}</td>`;
      } else {
        html += `<td>${val}</td>`;
      }
    }
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  if (isEditing) {
    html += `<div class="divider"></div><button class="btn btn-danger" onclick="deleteMemo()">このメモを削除</button>`;
  }
  body.innerHTML = html;

  if (isEditing) {
    document.getElementById('title-editor').addEventListener('input', e => {
      currentMemo.title = e.target.value;
      document.getElementById('detail-title').textContent = e.target.value;
    });
  }
}

function resizeTable() {
  const { rows, cols } = currentMemo._content;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay active';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">表のサイズ変更</span>
        <button class="btn-close" onclick="this.closest('.modal-overlay').remove()">×</button>
      </div>
      <div class="modal-body">
        <p style="font-size:13px;color:var(--text3);margin-bottom:16px">左上合わせでリサイズされます</p>
        <div class="resize-row">
          <label>行</label>
          <input type="number" class="form-input" id="resize-rows" value="${rows}" min="1" max="30">
        </div>
        <div class="resize-row">
          <label>列</label>
          <input type="number" class="form-input" id="resize-cols" value="${cols}" min="1" max="15">
        </div>
        <div style="height:12px"></div>
        <button class="btn btn-primary" onclick="applyResize(this)">適用</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function applyResize(btn) {
  const newRows = parseInt(document.getElementById('resize-rows').value) || 3;
  const newCols = parseInt(document.getElementById('resize-cols').value) || 3;
  const { rows, cols, cells } = currentMemo._content;
  const safeCells = cells || Array.from({length: rows}, () => Array(cols).fill(''));

  // save current edits first
  const currentCells = [];
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      const td = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
      row.push(td ? td.innerText : (safeCells[r] && safeCells[r][c]) ? safeCells[r][c] : '');
    }
    currentCells.push(row);
  }

  // resize left-top aligned
  const newCells = Array.from({length: newRows}, (_, r) =>
    Array.from({length: newCols}, (_, c) =>
      (r < rows && c < cols && currentCells[r]) ? (currentCells[r][c] || '') : ''
    )
  );

  currentMemo._content = { rows: newRows, cols: newCols, cells: newCells };
  btn.closest('.modal-overlay').remove();
  renderDetail();
}

// ── CHECKLIST ─────────────────────────────────────────
function renderChecklistDetail(body) {
  const items = currentMemo._content.items || [];
  body.className = 'detail-body' + (isEditing ? ' editing-mode' : '');

  let html = '';
  if (isEditing) {
    html += `
      <div class="form-group">
        <label class="form-label">タイトル</label>
        <input type="text" class="form-input" id="title-editor" value="${escHtml(currentMemo.title)}">
      </div>
      <div class="form-label" style="margin-bottom:8px">アイテム</div>`;
  }

  html += '<div class="checklist-items" id="checklist-items">';
  items.forEach((item, i) => {
    html += `
      <div class="check-item" data-index="${i}">
        <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleCheck(${i})">
        <input type="text" class="check-item-text ${item.done ? 'done' : ''}" value="${escHtml(item.text)}" ${isEditing ? '' : 'readonly'}>
        <button class="check-item-del" onclick="deleteCheckItem(${i})">×</button>
      </div>`;
  });
  html += '</div>';
  html += `<button class="btn-add-check" onclick="addCheckItem()">＋ アイテムを追加</button>`;

  if (isEditing) {
    html += `<div class="divider"></div><button class="btn btn-danger" onclick="deleteMemo()">このメモを削除</button>`;
  }

  body.innerHTML = html;

  if (isEditing && document.getElementById('title-editor')) {
    document.getElementById('title-editor').addEventListener('input', e => {
      currentMemo.title = e.target.value;
      document.getElementById('detail-title').textContent = e.target.value;
    });
  }
}

function toggleCheck(index) {
  const items = currentMemo._content.items || [];
  items[index].done = !items[index].done;
  // update text style
  const inputs = document.querySelectorAll('.check-item-text');
  inputs[index].classList.toggle('done', items[index].done);
  // auto-save
  db.from('memo_content').update({ content: currentMemo._content }).eq('id', currentMemo._contentId);
}

function addCheckItem() {
  if (!currentMemo._content.items) currentMemo._content.items = [];
  currentMemo._content.items.push({ text: '', done: false });
  renderDetail();
  // focus last
  const inputs = document.querySelectorAll('.check-item-text');
  if (inputs.length) inputs[inputs.length - 1].focus();
}

function deleteCheckItem(index) {
  currentMemo._content.items.splice(index, 1);
  renderDetail();
}

// ── IMAGE ─────────────────────────────────────────────
function renderImageDetail(body) {
  const images = currentMemo._content.images || [];
  body.className = 'detail-body' + (isEditing ? ' editing-mode' : '');

  let html = '';
  if (isEditing) {
    html += `
      <div class="form-group">
        <label class="form-label">タイトル</label>
        <input type="text" class="form-input" id="title-editor" value="${escHtml(currentMemo.title)}">
      </div>`;
  }

  if (images.length > 0) {
    html += '<div class="image-grid">';
    images.forEach((url, i) => {
      html += `
        <div class="image-item">
          <img src="${url}" onclick="openFullview('${url}')" loading="lazy">
          <button class="image-item-del" onclick="deleteImage(${i}, event)">×</button>
        </div>`;
    });
    html += '</div>';
  } else if (!isEditing) {
    html += '<div class="empty-state"><div class="icon">🖼️</div><p>画像なし</p></div>';
  }

  html += `
    <div class="image-upload-area" onclick="document.getElementById('img-upload').click()">
      <input type="file" id="img-upload" accept="image/*" multiple onchange="uploadImages(event)">
      <div style="font-size:24px;margin-bottom:8px">＋</div>
      <div>画像を追加</div>
    </div>`;

  if (isEditing) {
    html += `<div class="divider"></div><button class="btn btn-danger" onclick="deleteMemo()">このメモを削除</button>`;
  }

  body.innerHTML = html;

  if (isEditing && document.getElementById('title-editor')) {
    document.getElementById('title-editor').addEventListener('input', e => {
      currentMemo.title = e.target.value;
      document.getElementById('detail-title').textContent = e.target.value;
    });
  }
}

async function uploadImages(event) {
  const files = Array.from(event.target.files);
  if (!files.length) return;
  showToast('アップロード中...');

  for (const file of files) {
    const ext = file.name.split('.').pop();
    const path = `${currentMemo.id}/${Date.now()}.${ext}`;
    const { error } = await db.storage.from('memo-images').upload(path, file);
    if (!error) {
      const { data: urlData } = db.storage.from('memo-images').getPublicUrl(path);
      if (!currentMemo._content.images) currentMemo._content.images = [];
      currentMemo._content.images.push(urlData.publicUrl);
    }
  }

  await db.from('memo_content').update({ content: currentMemo._content }).eq('id', currentMemo._contentId);
  showToast('画像を追加しました');
  renderDetail();
}

async function deleteImage(index, event) {
  event.stopPropagation();
  currentMemo._content.images.splice(index, 1);
  await db.from('memo_content').update({ content: currentMemo._content }).eq('id', currentMemo._contentId);
  renderDetail();
}

function openFullview(url) {
  if (isEditing) return;
  document.getElementById('fullview-img').src = url;
  document.getElementById('img-fullview').classList.add('active');
}
function closeFullview() {
  document.getElementById('img-fullview').classList.remove('active');
}

// ── DELETE ────────────────────────────────────────────
async function deleteMemo() {
  if (!confirm(`「${currentMemo.title}」を削除しますか？`)) return;
  await db.from('memos').delete().eq('id', currentMemo.id);
  closeDetail();
  showToast('削除しました');
}

// ── DRAG & DROP ───────────────────────────────────────
function onDragStart(e, index) {
  dragSrcIndex = index;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragOver(e, index) {
  e.preventDefault();
  document.querySelectorAll('.memo-item').forEach(el => el.classList.remove('drag-over'));
  if (dragSrcIndex !== index) e.currentTarget.classList.add('drag-over');
}

async function onDrop(e, index) {
  e.preventDefault();
  if (dragSrcIndex === null || dragSrcIndex === index) return;
  const moved = memos.splice(dragSrcIndex, 1)[0];
  memos.splice(index, 0, moved);
  renderMemoList();
  // update sort_order
  const updates = memos.map((m, i) => db.from('memos').update({ sort_order: i }).eq('id', m.id));
  await Promise.all(updates);
}

function onDragEnd() {
  dragSrcIndex = null;
  document.querySelectorAll('.memo-item').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
  });
}

// ── UTILS ─────────────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// close modals on overlay click
document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeAddModal();
});

init();
</script>
</body>
</html>
